<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Minhas Compras | RePhone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body { font-family:'Inter',sans-serif; background:#f8fafc; padding:20px; color:#1e293b; }
.card { background:white; padding:24px; border-radius:20px; box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1); max-width:600px; margin:0 auto 20px auto; }
h2 { margin-top:0; }
.status { font-weight:900; margin-bottom:10px; color:#3b82f6; }
.timeline { font-size:14px; margin-top:10px; }
.timeline div { margin-bottom:8px; }
button { padding:12px; width:100%; border:none; border-radius:12px; font-weight:800; background-color:#10b981; color:white; cursor:pointer; transition:.2s; }
button:hover { background-color:#059669; }
button:disabled { background-color:#9ca3af; cursor:not-allowed; }
textarea { width:100%; box-sizing:border-box; margin-top:10px; padding:10px; border:1px solid #cbd5e1; border-radius:8px; resize:vertical; min-height:80px; }
</style>
</head>
<body>

<h2>Minhas Compras</h2>
<div id="comprasContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

// 🔹 Firebase Config atualizado
const firebaseConfig = { 
    apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
    authDomain: "rephone-a0a80.firebaseapp.com", 
    projectId: "rephone-a0a80", 
    storageBucket: "rephone-a0a80.firebasestorage.app", 
    messagingSenderId: "431497247030", 
    appId: "1:431497247030:web:a943715e4acc04b8995b97"  
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const container = document.getElementById("comprasContainer");

onAuthStateChanged(auth, (user)=>{
    if(!user) { window.location.href="login-cliente.html"; return; }

    const q = query(collection(db, "compras"), where("clienteId","==",user.uid));

    onSnapshot(q, (snap)=>{
        container.innerHTML = "";
        if(snap.empty){ container.innerHTML="<p>Você ainda não realizou nenhuma compra.</p>"; return; }

        snap.forEach(docSnap=>{
            const data = docSnap.data();
            const card = document.createElement("div");
            card.className="card";

            const timeline = `
                <div class="timeline">
                    <div>📦 Produto: ${data.produto || '-'}</div>
                    <div>💰 Valor: R$ ${Number(data.preco || 0).toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
                    <div>📅 Data do pedido: ${data.dataCompra?.toDate ? data.dataCompra.toDate().toLocaleString('pt-BR') : '-'}</div>
                    <div>💳 Forma de pagamento: ${data.pagamento || 'Aguardando'}</div>
                    <div>🚚 Forma de entrega: ${data.entrega || 'Aguardando'}</div>
                    <div>✅ Recebimento: ${data.confirmacaoComprador ? 'Confirmado' : 'Pendente'}</div>
                    <div>📝 Avaliação: ${data.avaliacaoComprador || '-'}</div>
                </div>
            `;

            const btn = `<textarea id="avaliacao_${docSnap.id}" placeholder="Como foi sua experiência? (Opcional)"></textarea>
                         <button id="btnConfirm_${docSnap.id}" ${data.confirmacaoComprador ? "disabled" : ""}>Confirmar Recebimento</button>`;

            card.innerHTML = `<h3 class="status">${data.status || 'Em andamento'}</h3>${timeline}${btn}`;
            container.appendChild(card);

            if(!data.confirmacaoComprador){
                const btnEl = document.getElementById(`btnConfirm_${docSnap.id}`);
                const textEl = document.getElementById(`avaliacao_${docSnap.id}`);

                btnEl.addEventListener("click", async ()=>{
                    btnEl.disabled=true;
                    btnEl.innerText="Enviando...";
                    try{
                        await updateDoc(doc(db, "compras", docSnap.id), {
                            confirmacaoComprador:true,
                            avaliacaoComprador:textEl.value,
                            status:"Entregue",
                            dataConfirmacao:serverTimestamp()
                        });
                    }catch(e){
                        alert("Erro ao confirmar. Tente novamente.");
                        btnEl.disabled=false;
                        btnEl.innerText="Confirmar Recebimento";
                    }
                });
            }
        });
    });
});
</script>

</body>
</html>
