<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Cliente | RePhone</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  background:#0d1324;
  color:white;
  font-family:'Poppins',sans-serif;
  margin:0;
}
header{
  background:#0b0f1a;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 0 20px rgba(0,0,0,.6);
}
button{
  background:#00c2ff;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}
button:hover{background:#0088ff}

.container{
  max-width:900px;
  margin:40px auto;
  background:#12182b;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(0,0,0,.6);
}

.card{
  background:#0b0f1a;
  padding:20px;
  border-radius:10px;
  margin-top:15px;
  border-left:4px solid #00c2ff;
}
</style>
</head>

<body>

<header>
 <h2>RePhone Assistência Técnica</h2>
 <button onclick="logout()">Sair</button>
</header>

<div class="container">
 <h2>Bem-vindo 👋</h2>
 <p id="userEmail"></p>

 <div class="card">
   <h3>Solicitar Assistência</h3>
   <p>Peça recolha, entrega ou leve até nossa assistência.</p>
   <button onclick="window.location.href='assistencia.html'">Abrir Pedido</button>
 </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔐 Proteção
auth.onAuthStateChanged(user=>{
 if(!user){
   window.location.href="login.html";
 } else {
   document.getElementById("userEmail").innerText = "Email: " + user.email;
 }
});

function logout(){
 auth.signOut();
}

</script>

</body>
</html>
