<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interesses Recebidos | RePhone</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --dark:#0f172a;
  --green:#16a34a;
  --bg:#f8fafc;
  --muted:#64748b;
}
*{box-sizing:border-box;font-family:Inter}
body{margin:0;background:var(--bg);padding:20px 20px 100px}
h1{font-size:26px;font-weight:900}
.card{
  background:#fff;
  border-radius:20px;
  padding:15px;
  box-shadow:0 6px 15px rgba(0,0,0,.05);
  border:1px solid #e2e8f0;
}
.list{display:flex;flex-direction:column;gap:15px;margin-top:20px}
.item{display:flex;gap:15px;align-items:center}
.item img{
  width:60px;height:60px;border-radius:12px;object-fit:cover
}
.info{flex:1}
.info h3{margin:0;font-size:15px;font-weight:800}
.info p{margin:4px 0;font-size:12px;color:var(--muted)}
.badge{
  font-size:11px;font-weight:800;
  padding:6px 12px;border-radius:999px
}
.whats{background:#dcfce7;color:#166534}
.empty{padding:40px;text-align:center;color:var(--muted)}
</style>
</head>

<body>

<h1>📲 Interesses Recebidos</h1>

<div id="lista" class="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import {
  getFirestore, collection, query, where, onSnapshot,
  doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

/* ===== FIREBASE ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4",
  authDomain: "rephone-a0a80.firebaseapp.com",
  projectId: "rephone-a0a80",
  appId: "1:431497247030:web:a943715e4acc04b8995b97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ===== LOAD ===== */
onAuthStateChanged(auth, user=>{
  if(!user){
    location.href="vendedor-login.html";
    return;
  }

  const q = query(
    collection(db,"interesses"),
    where("vendedorId","==",user.uid)
  );

  onSnapshot(q, async snap=>{
    const box = document.getElementById("lista");
    box.innerHTML="";

    if(snap.empty){
      box.innerHTML = `<div class="empty">Nenhum interesse recebido ainda.</div>`;
      return;
    }

    for(const d of snap.docs){
      const i = d.data();

      // buscar anúncio
      let anuncioTxt="Anúncio removido";
      let foto="https://via.placeholder.com/60";

      if(i.anuncioId){
        const adSnap = await getDoc(doc(db,"anuncios",i.anuncioId));
        if(adSnap.exists()){
          const ad = adSnap.data();
          anuncioTxt = `${ad.marca || ""} ${ad.modelo}`;
          foto = ad.fotos?.[0] || foto;
        }
      }

      const data = i.criadoEm?.toDate
        ? i.criadoEm.toDate().toLocaleString("pt-BR")
        : "--";

      const div = document.createElement("div");
      div.className="card item";

      div.innerHTML = `
        <img src="${foto}">
        <div class="info">
          <h3>${anuncioTxt}</h3>
          <p>📅 ${data}</p>
          <p>👤 ${i.compradorId==="anonimo"?"Visitante":"Usuário logado"}</p>
        </div>
        <span class="badge whats">WhatsApp</span>
      `;

      box.appendChild(div);
    }
  });
});
</script>

</body>
</html>
