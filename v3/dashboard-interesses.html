<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interesses | RePhone</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --dark:#0f172a;
  --green:#16a34a;
  --blue:#2563eb;
  --bg:#f8fafc;
  --muted:#64748b;
}

* { box-sizing:border-box; font-family:Inter; }

body {
  background:var(--bg);
  padding:20px;
  padding-bottom:100px;
}

h1 {
  font-size:26px;
  font-weight:900;
  margin-bottom:6px;
}

.subtitle {
  font-size:13px;
  color:var(--muted);
  margin-bottom:20px;
}

.card {
  background:white;
  border-radius:20px;
  padding:15px;
  margin-bottom:12px;
  border:1px solid #e2e8f0;
  box-shadow:0 4px 12px rgba(0,0,0,.04);
}

.card h3 {
  font-size:15px;
  font-weight:800;
}

.card p {
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.status {
  display:inline-block;
  margin-top:8px;
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:800;
}

.status.contato { background:#e0f2fe; color:#0369a1; }
.status.vendido { background:#dbeafe; color:#1d4ed8; }
.status.entregue { background:#dcfce7; color:#166534; }

.actions {
  display:flex;
  gap:8px;
  margin-top:10px;
}

button {
  border:none;
  padding:8px 12px;
  border-radius:12px;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
}

.btn-vendido { background:#2563eb; color:white; }
.btn-entregue { background:#16a34a; color:white; }
</style>
</head>

<body>

<h1>Interesses</h1>
<p class="subtitle">Pessoas que entraram em contato pelos seus anúncios</p>

<div id="lista"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4",
  authDomain: "rephone-a0a80.firebaseapp.com",
  projectId: "rephone-a0a80",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user)=>{
  if(!user) return location.href="vendedor-login.html";

  const q = query(
    collection(db,"interesses"),
    where("vendedorId","==",user.uid)
  );

  onSnapshot(q,(snap)=>{
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    if(snap.empty){
      lista.innerHTML = "<p>Nenhum contato ainda.</p>";
      return;
    }

    snap.forEach(docSnap=>{
      const i = docSnap.data();

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>Anúncio: ${i.anuncioId}</h3>
        <p>Canal: ${i.canal}</p>
        <p>Comprador: ${i.compradorId}</p>

        <span class="status ${i.status}">
          ${i.status.toUpperCase()}
        </span>

        <div class="actions">
          ${i.status==="contato" ? `
            <button class="btn-vendido" onclick="marcar('${docSnap.id}','vendido')">Vendido</button>
          ` : ``}

          ${i.status!=="entregue" ? `
            <button class="btn-entregue" onclick="marcar('${docSnap.id}','entregue')">Entregue</button>
          ` : ``}
        </div>
      `;

      lista.appendChild(div);
    });
  });
});

window.marcar = async (id,status)=>{
  await updateDoc(doc(db,"interesses",id),{ status });
};
</script>

</body>
</html>
