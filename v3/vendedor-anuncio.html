<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar Celular | RePhone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --green: #16a34a; --bg: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { font-weight: 800; margin-bottom: 20px; color: var(--dark); }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: #64748b; margin: 15px 0 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; outline: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-post { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; margin-top: 30px; cursor: pointer; }
        #preview { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; }
        .img-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; border: 2px solid var(--green); }
    </style>
</head>
<body>

<div class="container">
    <h2>Novo Anúncio</h2>
    <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">Capriche nos detalhes para o nosso <strong>Match</strong> encontrar você!</p>

    <form id="formAnuncio">
        <label>Marca</label>
        <select id="marca" required>
            <option value="Apple">Apple (iPhone)</option>
            <option value="Samsung">Samsung</option>
            <option value="Xiaomi">Xiaomi</option>
            <option value="Outra">Outra</option>
        </select>

        <label>Modelo exato</label>
        <input type="text" id="modelo" placeholder="Ex: iPhone 13 Pro Max" required>

        <div class="grid-2">
            <div>
                <label>Capacidade</label>
                <select id="capacidade">
                    <option value="64GB">64GB</option>
                    <option value="128GB">128GB</option>
                    <option value="256GB">256GB</option>
                    <option value="512GB">512GB</option>
                </select>
            </div>
            <div>
                <label>Saúde da Bateria (%)</label>
                <input type="number" id="bateria" placeholder="Ex: 88" min="1" max="100" required>
            </div>
        </div>

        <label>Condição Visual</label>
        <select id="condicao">
            <option value="Lacrado">Novo / Lacrado</option>
            <option value="Excelente">Excelente (Sem marcas)</option>
            <option value="Bom">Bom (Sinais leves de uso)</option>
            <option value="Usado">Usado (Riscos/Marcas visíveis)</option>
        </select>

        <label>Preço de Venda (R$)</label>
        <input type="number" id="preco" placeholder="Ex: 3500" required>

        <label>Fotos (Mínimo 1)</label>
        <input type="file" id="fotos" multiple accept="image/*" required>
        <div id="preview"></div>

        <button type="submit" class="btn-post" id="btnEnviar">PUBLICAR ANÚNCIO</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
    // Nota: O upload real exige o Firebase Storage, usaremos URLs temporárias para o exemplo
    
    const firebaseConfig = { /* SEU CONFIG AQUI */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let coords = { lat: null, lon: null };

    // Tenta pegar a localização exata do vendedor
    window.onload = () => {
        navigator.geolocation.getCurrentPosition(pos => {
            coords.lat = pos.coords.latitude;
            coords.lon = pos.coords.longitude;
        });
    };

    document.getElementById('formAnuncio').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        const user = auth.currentUser;
        if(!user) return alert("Você precisa estar logado!");

        const dados = {
            vendedorId: user.uid,
            marca: document.getElementById('marca').value,
            modelo: document.getElementById('modelo').value,
            capacidade: document.getElementById('capacidade').value,
            bateria: parseInt(document.getElementById('bateria').value),
            condicao: document.getElementById('condicao').value,
            preco: parseFloat(document.getElementById('preco').value),
            coords: coords, // O coração do Match por distância
            statusAnuncio: "aprovado", // Em produção, você usaria "pendente"
            statusVenda: "disponivel",
            dataCriacao: serverTimestamp(),
            fotos: ["https://via.placeholder.com/400?text=iPhone+Exemplo"] // Simulação de fotos
        };

        try {
            await addDoc(collection(db, "anuncios"), dados);
            alert("Anúncio publicado com sucesso!");
            window.location.href = "dashboard-vendedor.html";
        } catch (error) {
            console.error(error);
            alert("Erro ao publicar.");
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
