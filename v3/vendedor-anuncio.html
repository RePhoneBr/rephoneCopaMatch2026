<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CopaMatch | Cadastrar Figurinhas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #6b0b1a; --gold: #bda677; --green: #16a34a; --bg: #f8fafc; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); padding: 20px; }

        .header-cadastro { margin-bottom: 25px; }
        .header-cadastro h2 { font-weight: 900; color: var(--dark); font-size: 24px; }
        .header-cadastro p { color: #64748b; font-size: 13px; font-weight: 600; }

        .form-card { background: white; padding: 25px; border-radius: 25px; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        label { display: block; font-size: 11px; font-weight: 800; color: var(--dark); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-group { margin-bottom: 20px; }
        
        input, select, textarea { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1.5px solid #e2e8f0; 
            font-size: 14px; font-weight: 600; outline: none; transition: 0.2s;
        }
        
        input:focus { border-color: var(--gold); }

        .btn-postar { 
            width: 100%; background: var(--dark); color: white; padding: 18px; 
            border: none; border-radius: 15px; font-weight: 900; font-size: 16px; 
            cursor: pointer; box-shadow: 0 10px 20px rgba(107, 11, 26, 0.2);
        }

        .hint { font-size: 10px; color: #94a3b8; margin-top: 5px; font-weight: 600; }
        
        .tipo-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .tipo-option { 
            flex: 1; text-align: center; padding: 12px; border-radius: 12px; 
            border: 1.5px solid #e2e8f0; font-size: 11px; font-weight: 800; cursor: pointer;
        }
        .tipo-option.active { border-color: var(--dark); background: var(--dark); color: white; }
    </style>
</head>
<body>

    <div class="header-cadastro">
        <button onclick="history.back()" style="background:none; border:none; color:var(--dark); font-weight:800; margin-bottom:10px; cursor:pointer;">← VOLTAR</button>
        <h2>Postar Repetidas</h2>
        <p>Adicione suas figurinhas para troca ou venda.</p>
    </div>

    <div class="form-card">
        <div class="input-group">
            <label>Seleção / Categoria</label>
            <select id="figSelecao">
                <option value="Brasil">Brasil 🇧🇷</option>
                <option value="Argentina">Argentina 🇦🇷</option>
                <option value="França">França 🇫🇷</option>
                <option value="Lendas">Lendas (Legend) ⭐</option>
                <option value="Estádios">Estádios 🏟️</option>
                <option value="Outros">Outros Países</option>
            </select>
        </div>

        <div class="input-group">
            <label>Números das Figurinhas</label>
            <input type="text" id="figNumeros" placeholder="Ex: 10, 15, 22, 54">
            <p class="hint">Dica: Separe os números por vírgula para cadastrar vários de uma vez.</p>
        </div>

        <label>Tipo de Figurinha</label>
        <div class="tipo-selector">
            <div class="tipo-option active" onclick="setTipo(this, 'normal')">NORMAL</div>
            <div class="tipo-option" onclick="setTipo(this, 'brilhante')">BRILHANTE</div>
        </div>

        <div class="input-group">
            <label>Preço por Figurinha (R$)</label>
            <input type="number" id="figPreco" placeholder="0,00" step="0.50">
            <p class="hint">Deixe 0,00 se aceitar apenas trocas.</p>
        </div>

        <button class="btn-postar" onclick="salvarFigurinhas()">POSTAR NO RADAR</button>
    </div>

    <script>
        let tipoSelecionado = 'normal';

        function setTipo(el, tipo) {
            document.querySelectorAll('.tipo-option').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
            tipoSelecionado = tipo;
        }

        async function salvarFigurinhas() {
            const selecao = document.getElementById('figSelecao').value;
            const numerosBrutos = document.getElementById('figNumeros').value;
            const preco = document.getElementById('figPreco').value || 0;
            
            if(!numerosBrutos) return alert("Digite ao menos um número!");

            // Transforma a string "10, 15, 20" em um array [10, 15, 20]
            const listaNumeros = numerosBrutos.split(',').map(n => n.trim()).filter(n => n !== "");

            alert(`Processando ${listaNumeros.length} figurinhas da seleção ${selecao}...`);
            
            // Aqui entrará o loop para salvar no Firebase
            /* 
               listaNumeros.forEach(num => {
                  db.collection('anuncios').add({
                     numero: num,
                     selecao: selecao,
                     tipo: tipoSelecionado,
                     preco: preco,
                     status: 'aprovado',
                     data: new Date()
                  })
               })
            */
        }
    </script>
</body>
</html>
