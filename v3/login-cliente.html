<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | RePhone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --green: #16a34a; --bg: #f8fafc; --muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .login-card { background: white; width: 100%; max-width: 400px; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; }
        h2 { font-weight: 900; font-size: 28px; margin-bottom: 10px; letter-spacing: -1px; }
        p { color: var(--muted); font-size: 14px; margin-bottom: 30px; }

        .btn-google { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: white; border: 1px solid #e2e8f0; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .btn-google:hover { background: #f1f5f9; }
        .btn-google img { width: 20px; }

        .divider { display: flex; align-items: center; color: #cbd5e1; font-size: 12px; margin: 20px 0; font-weight: 700; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; margin: 0 10px; }

        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 15px; outline: none; }
        .btn-login { width: 100%; background: var(--dark); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        
        .footer-links { margin-top: 25px; font-size: 13px; color: var(--muted); }
        .footer-links a { color: var(--dark); font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>RePhone</h2>
    <p>Entre para negociar e acompanhar seus pedidos.</p>

    <button class="btn-google" id="btnGoogle">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Entrar com Google
    </button>

    <div class="divider">OU COM E-MAIL</div>

    <input type="email" id="email" placeholder="Seu e-mail">
    <input type="password" id="pass" placeholder="Sua senha">
    
    <button class="btn-login" id="btnLogin">ENTRAR</button>

    <div class="footer-links">
        Não tem conta? <a href="cadastro-cliente.html">Criar conta grátis</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
        authDomain: "rephone-a0a80.firebaseapp.com", 
        projectId: "rephone-a0a80", 
        storageBucket: "rephone-a0a80.firebasestorage.app", 
        appId: "1:431497247030:web:a943715e4acc04b8995b97" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // FUNÇÃO PARA DIRECIONAR O USUÁRIO
    function redirecionarAposLogin() {
        const urlParams = new URLSearchParams(window.location.search);
        const returnId = urlParams.get('returnId'); // Verifica se veio de um anúncio

        if (returnId) {
            window.location.href = `anuncio.html?id=${returnId}`;
        } else {
            window.location.href = 'index.html';
        }
    }

    // Login com Google
   document.getElementById('btnGoogle').onclick = async () => {
        const btn = document.getElementById('btnGoogle');
        btn.disabled = true;
        btn.innerText = "Conectando...";

        try {
            // Garante que a sessão persista mesmo se fechar a aba
            await setPersistence(auth, browserSessionPersistence);
            
            const result = await signInWithPopup(auth, provider);
            console.log("Sucesso:", result.user);
            redirecionarAposLogin();
            
        } catch (error) {
            console.error("Erro detalhado:", error);
            btn.disabled = false;
            btn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Entrar com Google`;
            
            if (error.code === 'auth/popup-closed-by-user') {
                alert("O login foi cancelado porque a janela foi fechada.");
            } else if (error.code === 'auth/cancelled-popup-request') {
                // Ignora, o usuário clicou duas vezes rápido
            } else {
                alert("Erro ao entrar com Google: " + error.message);
            }
        }
    };

    // LOGIN COM E-MAIL (MANTIDO)
    document.getElementById('btnLogin').onclick = async () => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Preencha e-mail e senha.");

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            redirecionarAposLogin();
        } catch (e) {
            alert("E-mail ou senha incorretos.");
        }
    };
</script>
</body>
</html>
