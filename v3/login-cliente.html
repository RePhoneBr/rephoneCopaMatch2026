<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Comprador | RePhone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --green: #16a34a; --bg: #f8fafc; --blue: #3b82f6; --red: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .login-card { background: white; padding: 35px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; }
        .logo { font-weight: 900; font-size: 24px; color: var(--dark); text-decoration: none; display: block; margin-bottom: 25px; }
        .logo span { color: var(--green); }

        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; margin-left: 5px; }
        .form-group input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 15px; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: var(--green); background: white; }

        .forgot-pass { display: block; text-align: right; font-size: 11px; color: var(--blue); font-weight: 700; text-decoration: none; margin-bottom: 20px; cursor: pointer; }

        .btn-login { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s; }
        .btn-login:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .btn-back { display: block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="index.html" class="logo">Re<span>Phone</span></a>
        <h2 style="font-weight: 900; margin-bottom: 30px; letter-spacing: -1px;">Acesse sua conta</h2>

        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="loginEmail" placeholder="seu@email.com">
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginPass" placeholder="••••••••">
        </div>

        <span class="forgot-pass" id="btnRecuperar">Esqueci minha senha</span>

        <button class="btn-login" id="btnLogin">ENTRAR</button>
        
        <p style="font-size: 12px; color: #64748b; margin-top: 20px;">
            Ainda não tem conta? <a href="cadastro-cliente.html" style="color: var(--blue); text-decoration: none; font-weight: 700;">Cadastre-se</a>
        </p>
        
        <a href="index.html" class="btn-back">← Voltar para a Home</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
            authDomain: "rephone-a0a80.firebaseapp.com", 
            projectId: "rephone-a0a80", 
            storageBucket: "rephone-a0a80.firebasestorage.app", 
            appId: "1:431497247030:web:a943715e4acc04b8995b97" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- Lógica de Login ---
        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            const btn = document.getElementById('btnLogin');

            if (!email || !pass) return alert("Por favor, preencha todos os campos.");

            btn.disabled = true;
            btn.innerText = "AUTENTICANDO...";

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "index.html";
            } catch (error) {
                console.error("Erro no login:", error.code);
                btn.disabled = false;
                btn.innerText = "ENTRAR";
                alert("Email ou senha incorretos.");
            }
        };

        // --- Lógica de Recuperação de Senha ---
        document.getElementById('btnRecuperar').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();

            if (!email) {
                return alert("Digite seu e-mail no campo acima para receber o link de recuperação.");
            }

            try {
                await sendPasswordResetEmail(auth, email);
                alert("Link de recuperação enviado para o seu e-mail! Verifique também a pasta de spam.");
            } catch (error) {
                console.error("Erro ao recuperar:", error.code);
                if (error.code === 'auth/user-not-found') {
                    alert("Este e-mail não está cadastrado.");
                } else {
                    alert("Ocorreu um erro ao tentar enviar o e-mail de recuperação.");
                }
            }
        };
    </script>
</body>
</html>
