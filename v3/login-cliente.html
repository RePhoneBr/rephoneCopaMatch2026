<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login Cliente | RePhone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body { font-family:'Inter',sans-serif; background:#f8fafc; display:flex; justify-content:center; align-items:center; height:100vh; padding:20px; }
.card { background:white; padding:35px; border-radius:25px; max-width:400px; width:100%; box-shadow:0 20px 40px rgba(0,0,0,0.05); text-align:center; }
h2 { font-weight:900; font-size:22px; margin-bottom:15px; }
input { width:100%; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:15px; font-size:15px; }
button { width:100%; padding:16px; border:none; border-radius:15px; font-weight:800; background:#16a34a; color:white; cursor:pointer; }
button:disabled { background:#9ca3af; cursor:not-allowed; }
</style>
</head>
<body>

<div class="card">
<h2>Login Cliente</h2>
<input type="email" id="email" placeholder="seu@email.com">
<input type="password" id="senha" placeholder="••••••••">
<button id="btnLogin">Entrar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

// 🔹 Firebase Config atualizado
const firebaseConfig = { 
    apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
    authDomain: "rephone-a0a80.firebaseapp.com", 
    projectId: "rephone-a0a80", 
    storageBucket: "rephone-a0a80.firebasestorage.app", 
    messagingSenderId: "431497247030", 
    appId: "1:431497247030:web:a943715e4acc04b8995b97"  
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("btnLogin").addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const btn = document.getElementById("btnLogin");
    btn.disabled = true;
    btn.innerText = "Verificando...";

    try{
        await signInWithEmailAndPassword(auth, email, senha);
        window.location.href = "compras.html";
    } catch(e){
        alert("E-mail ou senha incorretos.");
        btn.disabled = false;
        btn.innerText = "Entrar";
    }
});
</script>

</body>
</html>
