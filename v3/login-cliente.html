<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Comprador | RePhone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --green: #16a34a; --bg: #f8fafc; --blue: #3b82f6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card { background: white; padding: 35px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; }
        .logo { font-weight: 900; font-size: 24px; color: var(--dark); text-decoration: none; display: block; margin-bottom: 25px; }
        .logo span { color: var(--green); }
        .btn-google { width: 100%; background: white; color: var(--dark); border: 2px solid #e2e8f0; padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-google:hover { background: #f8fafc; border-color: #cbd5e1; }
        .divider { margin: 25px 0; color: #94a3b8; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .btn-back { display: block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="index.html" class="logo">Re<span>Phone</span></a>
        <h2 style="font-weight: 900; margin-bottom: 30px; letter-spacing: -1px;">Bem-vindo de volta!</h2>

        <button class="btn-google" id="btnGoogle">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa_list/google.svg" width="20">
            ENTRAR COM GOOGLE
        </button>

        <div class="divider">Ou use seu e-mail</div>
        
        <p style="font-size: 12px; color: #64748b;">Ainda não tem conta? <a href="cadastro-cliente.html" style="color: var(--blue); text-decoration: none; font-weight: 700;">Cadastre-se</a></p>
        
        <a href="index.html" class="btn-back">← Voltar para a Home</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
            authDomain: "rephone-a0a80.firebaseapp.com", 
            projectId: "rephone-a0a80", 
            storageBucket: "rephone-a0a80.firebasestorage.app", 
            appId: "1:431497247030:web:a943715e4acc04b8995b97" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('btnGoogle').onclick = async () => {
            const btn = document.getElementById('btnGoogle');
            btn.disabled = true;
            btn.innerText = "CONECTANDO...";

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Salva ou atualiza os dados do cliente no Firestore para garantir que o menu funcione
                const clientRef = doc(db, "clientes", user.uid);
                const clientSnap = await getDoc(clientRef);

                if (!clientSnap.exists()) {
                    await setDoc(clientRef, {
                        nome: user.displayName,
                        email: user.email,
                        tipo: "comprador",
                        dataCadastro: new Date()
                    });
                }

                window.location.href = "index.html";

            } catch (error) {
                console.error("Erro no Login Google:", error);
                btn.disabled = false;
                btn.innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa_list/google.svg" width="20"> ENTRAR COM GOOGLE`;
                
                if(error.code === 'auth/popup-closed-by-user') {
                    alert("Você fechou a janela de login antes de completar.");
                } else if (error.code === 'auth/unauthorized-domain') {
                    alert("Este domínio não está autorizado no Firebase. Adicione 'rephone.com.br' nas configurações.");
                } else {
                    alert("Erro ao entrar: " + error.message);
                }
            }
        };
    </script>
</body>
</html>
