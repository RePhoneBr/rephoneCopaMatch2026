<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhar Compra | RePhone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background:#f8fafc; padding:20px; color: #1e293b; }
  .card { background:#fff; padding:24px; border-radius:20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); max-width: 500px; margin: 0 auto; }
  h2 { margin-top: 0; }
  .status { font-weight:900; margin-bottom:20px; font-size: 1.1rem; color: #3b82f6; }
  
  /* Estilos do botão e estados */
  button { 
    padding:14px; width: 100%; border:none; border-radius:12px; font-weight:800; 
    background-color: #10b981; color: white; cursor: pointer; transition: 0.2s;
  }
  button:hover { background-color: #059669; }
  button:disabled { background-color: #9ca3af; cursor: not-allowed; }
  
  textarea { 
    width:100%; box-sizing: border-box; margin-top:15px; padding: 10px;
    border: 1px solid #cbd5e1; border-radius: 8px; resize: vertical; min-height: 80px;
  }
</style>
</head>
<body>

<div class="card">
  <h2>Acompanhar compra</h2>
  <p id="status" class="status">🔄 Carregando informações...</p>

  <textarea id="avaliacao" placeholder="Como foi sua experiência? (Opcional)"></textarea>
  
  <br><br>
  
  <button id="btnConfirmar">Confirmar Recebimento</button>
</div>

<script type="module">
// Lembre-se de verificar a versão correta. Aqui usamos a sintaxe modular padrão (v9/v10)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// ⚠️ SUBSTITUA PELAS SUAS CHAVES REAIS
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "123456",
  appId: "1:123456:web:xxxxx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Captura o ID da URL (?anuncio=XYZ)
const params = new URLSearchParams(window.location.search);
const anuncioId = params.get("anuncio");

const statusEl = document.getElementById("status");
const btnEl = document.getElementById("btnConfirmar");
const textoEl = document.getElementById("avaliacao");

if (!anuncioId) {
    statusEl.innerText = "❌ Erro: Pedido não identificado.";
    statusEl.style.color = "red";
    btnEl.disabled = true;
} else {
    // 1. OUVINTE EM TEMPO REAL (LEITURA)
    // Isso atualiza a tela automaticamente se o vendedor mudar o status
    onSnapshot(doc(db, "compras", anuncioId), (docSnap) => {
        if (docSnap.exists()) {
            const dados = docSnap.data();
            
            // Exemplo de lógica de status
            if (dados.confirmacaoComprador) {
                statusEl.innerText = "✅ Compra Finalizada";
                statusEl.style.color = "#10b981";
                btnEl.innerText = "Entrega já confirmada";
                btnEl.disabled = true;
                textoEl.style.display = 'none'; // Esconde avaliação se já acabou
            } else {
                statusEl.innerText = `📦 Status: ${dados.status || 'Aguardando atualização'}`;
            }
        } else {
            statusEl.innerText = "⚠️ Pedido não encontrado no sistema.";
        }
    }, (error) => {
        console.error("Erro ao buscar dados:", error);
        statusEl.innerText = "Erro de conexão.";
    });

    // 2. FUNÇÃO DE ATUALIZAÇÃO (ESCRITA)
    btnEl.addEventListener("click", async () => {
        const texto = textoEl.value;
        
        // UX: Trava o botão para evitar duplo clique
        btnEl.disabled = true;
        btnEl.innerText = "Enviando...";

        try {
            await updateDoc(doc(db, "compras", anuncioId), {
                confirmacaoComprador: true,
                status: "Entregue", // Atualiza o status geral também
                avaliacaoComprador: texto,
                dataConfirmacao: new Date()
            });
            
            // Não precisa de alert() se o onSnapshot acima atualizar a UI, 
            // mas ajuda como feedback imediato.
            alert("Obrigado! Entrega confirmada.");
            
        } catch (error) {
            console.error("Erro ao atualizar:", error);
            alert("Erro ao confirmar. Verifique sua conexão.");
            btnEl.disabled = false;
            btnEl.innerText = "Confirmar Recebimento";
        }
    });
}
</script>
</body>
</html>
