<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhar Compra | RePhone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body { font-family: Inter; background:#f8fafc; padding:20px }
.card { background:#fff;padding:20px;border-radius:20px }
.status { font-weight:900;margin-bottom:10px }
button { padding:12px;border:none;border-radius:12px;font-weight:800 }
</style>
</head>
<body>

<div class="card">
  <h2>Acompanhar compra</h2>
  <p id="status" class="status">Carregando...</p>

  <button onclick="confirmarEntrega()">Confirmar entrega</button>

  <textarea id="avaliacao" placeholder="Deixe uma sugestão..." 
    style="width:100%;margin-top:10px"></textarea>
</div>

<script type="module">
import { initializeApp } from 
"https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getFirestore, doc, updateDoc } from 
"https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

const app = initializeApp({ /* mesma config */ });
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const anuncioId = params.get("anuncio");

window.confirmarEntrega = async () => {
  const texto = document.getElementById("avaliacao").value;
  await updateDoc(doc(db,"compras", anuncioId), {
    confirmacaoComprador: true,
    avaliacaoComprador: texto
  });
  alert("Entrega confirmada!");
};
</script>
</body>
</html>
