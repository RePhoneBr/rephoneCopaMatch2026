<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Acompanhar Compras | RePhone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#f8fafc;padding:20px;color:#1e293b;}
h2{margin-top:0;}
.card{background:#fff;padding:24px;border-radius:20px;box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1);margin-bottom:20px;}
.status{font-weight:900;margin-bottom:15px;font-size:1.1rem;color:#3b82f6;}
textarea{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px;resize:vertical;min-height:80px;margin-bottom:10px;}
button{width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;background-color:#10b981;color:white;cursor:pointer;transition:0.2s;margin-bottom:10px;}
button:hover{background-color:#059669;}
button:disabled{background-color:#9ca3af;cursor:not-allowed;}
</style>
</head>
<body>

<h1>Minhas Compras</h1>
<div id="comprasContainer">Carregando suas compras...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getFirestore, doc, collection, onSnapshot, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const firebaseConfig = { 
    apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
    authDomain: "rephone-a0a80.firebaseapp.com", 
    projectId: "rephone-a0a80", 
    storageBucket: "rephone-a0a80.firebasestorage.app", 
    appId: "1:431497247030:web:a943715e4acc04b8995b97" 
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userLogado = null;

onAuthStateChanged(auth, async (user)=>{
    if(!user){ window.location.href='login-cliente.html'; return; }
    userLogado = user;
    carregarCompras();
});

async function carregarCompras(){
    const container = document.getElementById('comprasContainer');
    container.innerHTML="Carregando suas compras...";
    try{
        const q = query(collection(db,"compras"), where("clienteId","==",userLogado.uid));
        const snapshot = await getDocs(q);
        if(snapshot.empty){ container.innerHTML="<p>Nenhuma compra registrada.</p>"; return; }

        container.innerHTML="";
        snapshot.forEach(docSnap=>{
            const data = docSnap.data();
            const card = document.createElement("div");
            card.className="card";

            card.innerHTML=`
                <p class="status">📦 Status: ${data.status || 'Aguardando atualização'}</p>
                <p><strong>Anúncio:</strong> ${data.modelo} (${data.marca})</p>
                <p><strong>Vendedor:</strong> ${data.nomeVendedor || 'Desconhecido'}</p>
                <p><strong>Tipo:</strong> ${data.tipoVendedor || '--'}</p>
                <p><strong>WhatsApp:</strong> ${data.whatsapp || '--'}</p>
                <p><strong>Cidade:</strong> ${data.cidade || '--'}</p>
                <p><strong>Preço:</strong> R$ ${data.preco || '--'}</p>
                <p><strong>Estoque atual:</strong> ${data.estoque || 0}</p>
            `;

            if(!data.confirmacaoComprador){
                const textarea = document.createElement("textarea");
                textarea.placeholder="Como foi sua experiência? (Opcional)";
                card.appendChild(textarea);

                const btn = document.createElement("button");
                btn.innerText="Confirmar Recebimento";
                btn.onclick=async ()=>{
                    btn.disabled=true; btn.innerText="Enviando...";
                    try{
                        // Atualiza compra do cliente
                        await updateDoc(doc(db,"compras",docSnap.id),{
                            confirmacaoComprador:true,
                            status:"Entregue",
                            avaliacaoComprador:textarea.value,
                            dataConfirmacao:new Date()
                        });

                        // Atualiza estoque do anúncio vinculado
                        const anuncioRef = doc(db,"anuncios",data.anuncioId);
                        const anuncioSnap = await getDocs(query(collection(db,"anuncios"), where("__name__","==",data.anuncioId)));
                        const anuncioDoc = await anuncioRef.get();
                        const atual = (data.estoque || 1)-1;
                        await updateDoc(anuncioRef,{
                            estoque: atual,
                            statusVenda: atual>0?"disponivel":"inativo"
                        });

                        alert("Compra confirmada!");
                        carregarCompras();
                    }catch(e){ console.error(e); alert("Erro ao confirmar."); btn.disabled=false; btn.innerText="Confirmar Recebimento";}
                };
                card.appendChild(btn);
            }else{
                card.innerHTML+=`<p>✅ Compra finalizada em ${data.dataConfirmacao?.toDate?.() || '--'}</p>`;
                if(data.avaliacaoComprador) card.innerHTML+=`<p><strong>Avaliação:</strong> ${data.avaliacaoComprador}</p>`;
            }

            container.appendChild(card);
        });
    }catch(e){ console.error(e); container.innerHTML="<p>Erro ao carregar compras.</p>"; }
}
</script>
</body>
</html>
