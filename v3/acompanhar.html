<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Compras | RePhone</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background:#f8fafc; padding:20px; color: #1e293b; }
h1 { text-align:center; margin-bottom:20px; font-size:1.6rem; font-weight:900; }
.compra-card { background:#fff; padding:20px; border-radius:20px; box-shadow:0 4px 6px rgba(0,0,0,0.1); margin-bottom:20px; }
.compra-card h2 { font-size:1.2rem; margin-top:0; font-weight:900; }
.status { font-weight:900; margin-bottom:15px; font-size: 1rem; color:#3b82f6; }
.timeline { list-style:none; padding:0; margin:0 0 15px 0; }
.timeline li { margin-bottom:10px; background:#f1f5f9; padding:8px 12px; border-radius:12px; display:flex; justify-content:space-between; font-size:0.9rem; }
.timeline li span { font-weight:700; color:#64748b; font-size:0.8rem; }

button { 
    padding:10px; width:100%; border:none; border-radius:12px; font-weight:800; 
    background-color: #10b981; color: white; cursor: pointer; transition:0.2s; margin-bottom:10px;
}
button:hover { background-color:#059669; }
button:disabled { background-color:#9ca3af; cursor:not-allowed; }

textarea { width:100%; box-sizing:border-box; margin-top:8px; padding: 8px; border:1px solid #cbd5e1; border-radius:8px; resize:vertical; min-height:60px; margin-bottom:10px; }

.btn-group { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
.btn-group button { flex:1; padding:8px; font-size:0.85rem; }
</style>
</head>
<body>

<h1>Minhas Compras</h1>
<div id="comprasContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

// 🔹 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "123456",
  appId: "1:123456:web:xxxxx"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const container = document.getElementById("comprasContainer");

// 🔹 Verifica login
onAuthStateChanged(auth, user => {
    if (!user) {
        alert("Faça login para acessar suas compras.");
        window.location.href = "login-cliente.html";
        return;
    }

    const comprasQuery = query(collection(db, "compras"), where("clienteId","==",user.uid));

    onSnapshot(comprasQuery, snap => {
        container.innerHTML = '';
        if (snap.empty) {
            container.innerHTML = '<p>Você ainda não tem compras registradas.</p>';
            return;
        }

        snap.forEach(docSnap => {
            const dados = docSnap.data();
            const compraId = docSnap.id;

            // Cria card da compra
            const card = document.createElement("div");
            card.className = "compra-card";

            // Status geral
            let statusTexto = "📦 Aguardando atualização";
            if (dados.confirmacaoRecebimento) statusTexto = "✅ Compra finalizada";
            else if (dados.statusGeral) statusTexto = `📦 Status: ${dados.statusGeral}`;

            card.innerHTML = `
                <h2>${dados.produto || 'Produto não informado'}</h2>
                <p class="status">${statusTexto}</p>
                <ul class="timeline" id="timeline-${compraId}"></ul>
                <div id="pagamento-${compraId}">
                    <h3>Forma de Pagamento</h3>
                    <div class="btn-group">
                        <button onclick="marcarPagamento('${compraId}','PIX')">PIX</button>
                        <button onclick="marcarPagamento('${compraId}','Cartão')">Cartão</button>
                        <button onclick="marcarPagamento('${compraId}','Boleto')">Boleto</button>
                    </div>
                </div>
                <div id="entrega-${compraId}">
                    <h3>Forma de Entrega</h3>
                    <div class="btn-group">
                        <button onclick="marcarEntrega('${compraId}','Retirada')">Retirada</button>
                        <button onclick="marcarEntrega('${compraId}','Entrega')">Entrega</button>
                    </div>
                </div>
                <button id="btnConfirmar-${compraId}">Confirmar Recebimento</button>
                <textarea id="avaliacao-${compraId}" placeholder="Avalie o vendedor"></textarea>
                <button onclick="avaliarVendedor('${compraId}')">Enviar Avaliação</button>
            `;

            container.appendChild(card);

            // Timeline em tempo real para cada compra
            const timelineEl = document.getElementById(`timeline-${compraId}`);
            const compraRef = doc(db, "compras", compraId);
            onSnapshot(compraRef, snap => {
                const data = snap.data();
                timelineEl.innerHTML = '';
                if (data.timeline?.length) {
                    data.timeline.forEach(ev => {
                        const li = document.createElement('li');
                        const date = new Date(ev.data).toLocaleString('pt-BR');
                        li.innerHTML = `${ev.evento} <span>${date}</span>`;
                        timelineEl.appendChild(li);
                    });
                }

                // Desativa botão se já confirmado
                const btnConf = document.getElementById(`btnConfirmar-${compraId}`);
                const pagEl = document.getElementById(`pagamento-${compraId}`);
                const entEl = document.getElementById(`entrega-${compraId}`);
                const avEl = document.getElementById(`avaliacao-${compraId}`);
                if (data.confirmacaoRecebimento) {
                    btnConf.innerText = "Entrega já confirmada";
                    btnConf.disabled = true;
                    pagEl.style.display = 'none';
                    entEl.style.display = 'none';
                    avEl.style.display = 'none';
                } else {
                    btnConf.onclick = async () => {
                        const snap2 = await doc(db,"compras",compraId).get();
                        const timeline = data.timeline || [];
                        await updateDoc(compraRef,{
                            confirmacaoRecebimento:true,
                            statusGeral:"finalizado",
                            timeline:[...timeline,{evento:"Comprador confirmou recebimento",data:Date.now()}]
                        });
                        alert("Entrega confirmada!");
                    }
                }
            });
        });
    });
});

// 🔹 Funções globais
window.marcarPagamento = async (compraId,tipo) => {
    const compraRef = doc(db,"compras",compraId);
    const snap = await getDoc(compraRef);
    const timeline = snap.data().timeline || [];
    await updateDoc(compraRef,{
        pagamento:{escolhido:true,tipo},
        timeline:[...timeline,{evento:`Pagamento escolhido: ${tipo}`,data:Date.now()}]
    });
}

window.marcarEntrega = async (compraId,tipo) => {
    const compraRef = doc(db,"compras",compraId);
    const snap = await getDoc(compraRef);
    const timeline = snap.data().timeline || [];
    await updateDoc(compraRef,{
        entrega:{definida:true,tipo},
        timeline:[...timeline,{evento:`Entrega escolhida: ${tipo}`,data:Date.now()}]
    });
}

window.avaliarVendedor = async (compraId) => {
    const textoEl = document.getElementById(`avaliacao-${compraId}`);
    const texto = textoEl.value;
    if (!texto) return alert("Digite sua avaliação");
    const compraRef = doc(db,"compras",compraId);
    const snap = await getDoc(compraRef);
    const timeline = snap.data().timeline || [];
    await updateDoc(compraRef,{
        avaliacaoComprador:texto,
        timeline:[...timeline,{evento:"Comprador avaliou vendedor",data:Date.now()}]
    });
    alert("Avaliação enviada!");
    textoEl.value = "";
}
</script>
</body>
</html>
