<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Vendedor | RePhone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --green: #16a34a; --bg: #f8fafc; --muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); padding: 20px; }
        
        .reg-card { max-width: 450px; margin: 40px auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        h2 { font-weight: 900; font-size: 28px; margin-bottom: 5px; letter-spacing: -1px; }
        p { color: var(--muted); font-size: 14px; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--green); }

        .gps-box { background: #f1f5f9; padding: 10px; border-radius: 10px; font-size: 12px; color: var(--green); font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
        
        .btn-reg { width: 100%; background: var(--dark); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-reg:hover { background: #1e293b; transform: translateY(-2px); }
        .btn-reg:disabled { background: #94a3b8; }
    </style>
</head>
<body>

<div class="reg-card">
    <h2>RePhone</h2>
    <p>Crie sua conta de vendedor em segundos.</p>

    <div class="form-group">
        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Ex: João Silva">
    </div>

    <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-group">
            <label>WhatsApp</label>
            <input type="number" id="whatsapp" placeholder="11999998888">
        </div>
        <div class="form-group">
            <label>Tipo de Perfil</label>
            <select id="tipo">
                <option value="particular">Particular</option>
                <option value="lojista">Lojista / Assistência</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Senha de Acesso</label>
        <input type="password" id="pass" placeholder="Mínimo 6 caracteres">
    </div>

    <div class="gps-box" id="gpsStatus">
        📍 Detectando sua localização...
    </div>
    <input type="hidden" id="cidadeLatLong">

    <button class="btn-reg" id="btnReg">CRIAR CONTA</button>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
        authDomain: "rephone-a0a80.firebaseapp.com", 
        projectId: "rephone-a0a80", 
        storageBucket: "rephone-a0a80.firebasestorage.app", 
        appId: "1:431497247030:web:a943715e4acc04b8995b97" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let cidadeDetectada = "Não informada";
    let coordsDetectadas = null;
    let infoAuditoria = {
        dispositivo: navigator.userAgent, // Captura navegador/sistema
        plataforma: navigator.platform,
        idioma: navigator.language
    };

    // --- LOGICA DE LOCALIZAÇÃO SEGURA ---
    async function iniciarLocalizacao() {
        const gpsStatus = document.getElementById('gpsStatus');

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    coordsDetectadas = { lat, lon, metodo: "gps" };
                    buscarCidadeNominatim(lat, lon);
                },
                async () => {
                    // Fallback automático por IP se o GPS for negado
                    gpsStatus.innerHTML = "🛡️ Validando conexão segura...";
                    capturarPorIP();
                },
                { timeout: 5000 }
            );
        } else {
            capturarPorIP();
        }
    }

    async function capturarPorIP() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            coordsDetectadas = { 
                lat: data.latitude, 
                lon: data.longitude, 
                metodo: "ip_fallback",
                ip: data.ip 
            };
            cidadeDetectada = data.city || "Região via IP";
            document.getElementById('gpsStatus').innerHTML = `🛡️ Conexão validada: <b>${cidadeDetectada}</b>`;
        } catch (e) {
            document.getElementById('gpsStatus').innerText = "📍 Localização pendente";
        }
    }

    async function buscarCidadeNominatim(lat, lon) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
            const data = await res.json();
            cidadeDetectada = data.address.city || data.address.town || "Desconhecida";
            document.getElementById('gpsStatus').innerHTML = `📍 Localizado em <b>${cidadeDetectada}</b>`;
        } catch (e) {}
    }

    iniciarLocalizacao();

    // --- REGISTRO FINAL ---
    document.getElementById('btnReg').onclick = async () => {
        const nome = document.getElementById('nome').value.trim();
        const email = document.getElementById('email').value.toLowerCase().trim();
        const zap = document.getElementById('whatsapp').value.trim();
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btnReg');

        if(!nome || !email || !zap || !pass) return alert("Preencha todos os campos!");

        btn.disabled = true;
        btn.innerText = "CRIANDO PERFIL SEGURO...";

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            await updateProfile(user, { displayName: nome });

            // Salva o perfil com os dados de auditoria
            await setDoc(doc(db, "vendedores", user.uid), {
                nome, email, zap,
                tipo: document.getElementById('tipo').value,
                cidade: cidadeDetectada,
                coords: coordsDetectadas,
                auditoria: infoAuditoria, // Dados de prevenção de golpe
                status: "ativo",
                dataRegistro: serverTimestamp()
            });

            window.location.href = 'dashboard-vendedor.html';
        } catch (e) {
            alert("Erro: " + e.message);
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
