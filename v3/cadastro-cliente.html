<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
        authDomain: "rephone-a0a80.firebaseapp.com", 
        projectId: "rephone-a0a80", 
        storageBucket: "rephone-a0a80.firebasestorage.app", 
        appId: "1:431497247030:web:a943715e4acc04b8995b97" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // FUNÇÃO PARA DIRECIONAR O USUÁRIO (Igual ao Login)
    function redirecionarAposRegistro() {
        const urlParams = new URLSearchParams(window.location.search);
        const returnId = urlParams.get('returnId'); 

        if (returnId) {
            window.location.href = `anuncio.html?id=${returnId}`;
        } else {
            window.location.href = 'index.html';
        }
    }

    document.getElementById('btnReg').onclick = async () => {
        const nome = document.getElementById('nome').value.trim();
        const email = document.getElementById('email').value.toLowerCase().trim();
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btnReg');

        if(!nome || !email || !pass) return alert("Preencha todos os campos.");
        if(pass.length < 6) return alert("A senha deve ter no mínimo 6 caracteres.");

        btn.disabled = true;
        btn.innerText = "CRIANDO CONTA...";

        try {
            // 1. Cria o usuário no Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;

            // 2. Atualiza o nome no perfil do Auth
            await updateProfile(user, { displayName: nome });

            // 3. Salva os dados na coleção de 'clientes'
            await setDoc(doc(db, "clientes", user.uid), {
                nome: nome,
                email: email,
                uid: user.uid,
                dataCadastro: serverTimestamp(), // Usa o tempo do servidor para precisão
                tipo: "comprador"
            });

            alert("Bem-vindo à RePhone, " + nome + "!");
            redirecionarAposRegistro();

        } catch (e) {
            console.error(e);
            let msg = "Erro ao criar conta: " + e.message;
            if (e.code === 'auth/email-already-in-use') msg = "Este e-mail já está em uso.";
            
            alert(msg);
            btn.disabled = false;
            btn.innerText = "CRIAR MINHA CONTA";
        }
    };
</script>
