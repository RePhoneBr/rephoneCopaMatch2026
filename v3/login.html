<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login | RePhone Assistência</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  background:#0b0f1a;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#fff;
}
.container{
  background:#12182b;
  padding:40px;
  width:380px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(0,0,0,.6);
  text-align:center;
}
h2{margin-bottom:20px;font-weight:600}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #333;
  background:#0d1324;
  color:#fff;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#00c2ff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:.3s;
}
button:hover{background:#0088ff}
.msg{margin-top:10px;font-size:14px;color:#ff6b6b}
</style>
</head>
<body>

<div class="container">
  <h2>Login do Cliente</h2>

  <input id="email" type="email" placeholder="Seu email">
  <input id="senha" type="password" placeholder="Sua senha">

  <button onclick="login()">Entrar</button>
  <p class="msg" id="msg"></p>
</div>


<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const msg = document.getElementById("msg");

  auth.signInWithEmailAndPassword(email, senha)
  .then(()=>{
     window.location.href = "painel.html";
  })
  .catch(e=>{
     msg.innerText = "Login inválido: " + e.message;
  })
}

auth.onAuthStateChanged(user=>{
 if(user){ window.location.href="painel.html"; }
});

</script>

</body>
</html>
