<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login | RePhone Assistência</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  background:#0b0f1a;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#fff;
}
.container{
  background:#12182b;
  padding:40px;
  width:380px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(0,0,0,.6);
  text-align:center;
}
h2{margin-bottom:20px;font-weight:600}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #333;
  background:#0d1324;
  color:#fff;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#00c2ff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:.3s;
}
button:hover{background:#0088ff}
.msg{margin-top:10px;font-size:14px;color:#ff6b6b}
</style>
</head>
<body>

<div class="container">
  <h2>Login do Cliente</h2>

  <input id="email" type="email" placeholder="Seu email">
  <input id="senha" type="password" placeholder="Sua senha">

  <button onclick="login()">Entrar</button>
  <p class="msg" id="msg"></p>
</div>


<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<script>

// 🔥 CONFIG FIREBASE
  <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
            authDomain: "rephone-a0a80.firebaseapp.com", 
            projectId: "rephone-a0a80", 
            storageBucket: "rephone-a0a80.firebasestorage.app", 
            messagingSenderId: "431497247030", 
            appId: "1:431497247030:web:a943715e4acc04b8995b97" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEntrar');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "dashboard-vendedor.html";
            } catch (error) {
                console.error(error);
                let msg = "Erro ao entrar. Verifique e-mail e senha.";
                if (error.code === 'auth/user-not-found') msg = "E-mail não cadastrado.";
                if (error.code === 'auth/wrong-password') msg = "Senha incorreta.";
                
                alert(msg);
                btn.innerText = "ENTRAR NO PAINEL";
                btn.disabled = false;
            }

</script>

</body>
</html>
