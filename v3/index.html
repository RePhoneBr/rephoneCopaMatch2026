        :root { --dark: #0f172a; --green: #16a34a; --green-light: #4ade80; --bg: #f8fafc; --text-muted: #64748b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); overflow-x: hidden; }
        
        /* HEADER MODERNA E ARREDONDADA */
        .main-header { 
            background: var(--dark);

            align-items: center;

.toggle-busca {

}

/* COLLAPSIBLE */
.busca-collapsible {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transform: translateY(-8px);
  transition: all 0.45s cubic-bezier(.4,0,.2,1);
  margin-top: 0;
}

/* ABERTO */
.busca-collapsible.open {
  max-height: 600px;
  opacity: 1;
  transform: translateY(0);
  margin-top: 14px;
}

/* DESKTOP → SEMPRE ABERTO */
@media (min-width: 1024px) {
  .busca-collapsible {
    max-height: none;
    opacity: 1;
    transform: none;
    margin-top: 18px;
  }

  .toggle-busca {
    display: none;
  }
}

    // --- LOCALIZAÇÃO PADRÃO POR GPS (COM FALLBACK) ---
async function detectarCidade() {
    const txtLoc = document.getElementById('txtLocation');

    // Texto imediato (UX)
    txtLoc.innerHTML = "📍 Localizando ofertas perto de você...";

    // 1️⃣ GPS
    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(
            async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                try {
                    const res = await fetch(
                        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
                    );
                    const data = await res.json();

                    const cidade =
                        data.address.city ||
                        data.address.town ||
                        data.address.village;

                    if (cidade) {
                        txtLoc.innerHTML = `Ofertas exclusivas em <strong>📍 ${cidade}</strong>. Faça Match e compre bem pertinho de você!`;
                        return;
                    }

                    throw new Error("Cidade não encontrada");
                } catch {
                    detectarCidadePorIP();
                }
            },
            () => {
                // Usuário negou GPS
                detectarCidadePorIP();
            },
            {
                enableHighAccuracy: false,
                timeout: 8000,
                maximumAge: 60000
            }
        );
    } else {
        detectarCidadePorIP();
    }
}
