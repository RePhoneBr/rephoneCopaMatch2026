<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RePhone | Match Inteligente</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LHRJ19C0CW"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-LHRJ19C0CW', { 'storage': 'denied' });
    </script>

    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root { --dark: #0f172a; --green: #16a34a; --green-light: #4ade80; --bg: #f8fafc; --text-muted: #64748b; --blue: #3b82f6; --red: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); overflow-x: hidden; }
        
        .main-header { background: var(--dark); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 25px 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 22px; color: white; text-decoration: none; }
        .logo span { color: var(--green); }
        .slogan { color: #94a3b8; font-size: 10px; font-weight: 600; margin-top: 4px; }
        .btn-menu-icon { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }

        .location-bar { text-align: center; font-size: 11px; color: var(--text-muted); padding: 15px 20px 5px; font-weight: 600; max-width: 600px; margin: 0 auto; }
        .location-bar strong { color: var(--green); font-weight: 800; }

        #mobileMenu { position: fixed; top: -100%; left: 0; width: 100%; background: var(--dark); padding: 80px 25px 30px; z-index: 2000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 0 0 30px 30px; display: flex; flex-direction: column; gap: 12px; }
        #mobileMenu.active { top: 0; }
        #menuOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1900; }
        .menu-link { padding: 18px; border-radius: 15px; text-decoration: none; font-weight: 800; font-size: 13px; text-align: center; color: white; background: rgba(255,255,255,0.05); }
        .menu-link.destaque { background: var(--green); }

        .hero { padding: 10px 20px 30px; max-width: 600px; margin: 0 auto; }
        .match-card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .status-circle { width: 12px; height: 12px; border-radius: 50%; background: #cbd5e1; transition: 0.3s; }
        .searching { background: var(--blue) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .match-card label { display: block; font-weight: 800; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .match-card input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; margin-bottom: 12px; font-size: 15px; outline: none; }
        .btn-match { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; }

        .busca-collapsible { overflow: hidden; max-height: 0; transition: 0.4s; }
        .busca-collapsible.open { max-height: 500px; margin-top: 15px; }

        .feed { padding: 0 15px 150px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 1024px) { .feed { grid-template-columns: repeat(4, 1fr); } }

        .card { background: white; border-radius: 20px; padding: 10px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; text-decoration: none; color: inherit; position: relative; }
        .img-container { width: 100%; aspect-ratio: 1/1; background: #f1f5f9; border-radius: 14px; overflow: hidden; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .badge-vendido { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); background: var(--red); color: white; padding: 5px 10px; border-radius: 8px; font-weight: 900; font-size: 12px; z-index: 5; }

        .price-tag { background: linear-gradient(135deg, #16a34a, #4ade80); color: white; padding: 5px 10px; border-radius: 8px; font-weight: 900; font-size: 15px; margin-top: auto; align-self: flex-start; }

        #matchPopup { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--dark); color: white; padding: 25px; border-radius: 30px 30px 0 0; z-index: 3000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #matchPopup.active { bottom: 0; }

        .rephone-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 12px 20px; z-index: 1000; border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .footer-links { display: flex; gap: 15px; font-size: 11px; }
        .footer-links a { color: #94a3b8; text-decoration: none; font-weight: 600; }
        .lgpd-banner { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: var(--dark); color: white; padding: 15px; border-radius: 20px; z-index: 4000; display: none; justify-content: space-between; align-items: center; font-size: 11px; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="brand-container">
            <a href="index.html" class="logo">Re<span>Phone</span></a>
            <span class="slogan">O Match do seu novo celular</span>
        </div>
        <button class="btn-menu-icon" onclick="toggleMenu()">☰</button>
    </header>

    <div class="location-bar" id="txtLocation">📍 Localizando ofertas próximas...</div>

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <nav id="mobileMenu">
        <div id="greeting" style="color:#94a3b8; font-size:11px; font-weight:800; text-align:center; margin-bottom:10px;">MENU REPHONE</div>
        <a href="login-cliente.html?goto=compras" class="menu-link" style="background: #3b82f6;">🛍️ Minhas Compras / Rastreio</a>
        <div id="menuGuest">
            <a href="vendedor-login.html" class="menu-link destaque">Entrar / Vender</a>
        </div>
        <div id="menuLogged" style="display: none;">
            <a href="vendedor-anuncio.html" class="menu-link destaque">+ Novo Anúncio</a>
            <button class="btn-logout-menu" onclick="fazerLogout()" style="width:100%">SAIR DA CONTA</button>
        </div>
    </nav>

    <section class="hero">
        <div class="match-card">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
                <div id="mCircle" class="status-circle"></div>
                <div id="mText" style="font-size: 11px; font-weight: 800; color: var(--text-muted);">BUSCADOR INTELIGENTE</div>
            </div>
            <label>Modelo desejado</label>
            <input type="text" id="matchModelo" placeholder="Ex: iPhone 13 Pro">
            <label>Preço Máximo</label>
            <input type="number" id="matchPreco" placeholder="Ex: 4000">
            <button class="btn-match" onclick="fazerMatch()">DAR MATCH</button>
            <button class="btn-match" style="background:#f1f5f9; color:var(--dark); margin-top:10px;" onclick="toggleBusca()">🔍 BUSCA MANUAL</button>
            
            <div id="buscaManualBox" class="busca-collapsible">
                <input type="text" id="buscaMarca" placeholder="Marca (Apple, Samsung...)">
                <button class="btn-match" onclick="buscarManual()">FILTRAR AGORA</button>
                <button class="btn-match" style="background:none; color:var(--text-muted)" onclick="limparBusca()">LIMPAR FILTROS</button>
            </div>
        </div>
    </section>

    <main id="radarGrid" class="feed"></main>

    <div id="matchPopup">
        <span class="match-label">🔥 MATCH!</span>
        <div id="matchData" style="display: flex; align-items: center; gap: 15px; margin: 15px 0;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-match" style="background:#334155" onclick="fecharMatch()">FECHAR</button>
            <a href="#" id="matchLink" class="btn-match" style="text-decoration:none; text-align:center;">VER AGORA</a>
        </div>
    </div>

    <div id="lgpdBanner" class="lgpd-banner">
        <span>Usamos cookies para melhorar sua experiência.</span>
        <button onclick="aceitarCookies()" style="background:var(--green); border:none; padding:8px 15px; border-radius:8px; color:white; font-weight:800; cursor:pointer;">OK</button>
    </div>

    <footer class="rephone-footer">
        <div class="footer-links">
            <a href="sobre.html">Sobre</a>
            <a href="politica-de-privacidade.html">Privacidade</a>
            <a href="termos-de-uso.html">Termos</a>
        </div>
        <div style="color: #64748b; font-size: 10px; font-weight: 700;">RePhone © 2026 — Versão 4.0</div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
            authDomain: "rephone-a0a80.firebaseapp.com", 
            projectId: "rephone-a0a80", 
            storageBucket: "rephone-a0a80.firebasestorage.app", 
            appId: "1:431497247030:web:a943715e4acc04b8995b97" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let todosAnuncios = [];
        let uLat = null, uLng = null;

        // --- AUTH & REDIRECT ---
        onAuthStateChanged(auth, async (user) => {
            const params = new URLSearchParams(window.location.search);
            if (user) {
                document.getElementById('menuGuest').style.display = 'none';
                document.getElementById('menuLogged').style.display = 'block';
                if (params.get('goto') === 'compras') window.location.href = 'minhas-compras.html';
                if (params.get('returnId')) window.location.href = `anuncio.html?id=${params.get('returnId')}`;
            }
        });

        window.fazerLogout = () => signOut(auth).then(() => window.location.reload());

        // --- LOCALIZAÇÃO ---
        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            uLat = pos.coords.latitude; uLng = pos.coords.longitude;
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${uLat}&lon=${uLng}`);
                const data = await res.json();
                const cidade = data.address.city || data.address.town || data.address.village || "sua região";
                document.getElementById('txtLocation').innerHTML = `📍 Ofertas exclusivas em <strong>${cidade}</strong>`;
                renderizar(todosAnuncios);
            } catch (e) { detectarIP(); }
        }, () => detectarIP(), { timeout: 8000 });

        async function detectarIP() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                document.getElementById('txtLocation').innerHTML = `📍 Ofertas em <strong>${data.city || 'sua região'}</strong>`;
            } catch(e) {}
        }

        // --- DADOS ---
        onSnapshot(query(collection(db, "anuncios"), where("status", "==", "aprovado")), (snap) => {
            todosAnuncios = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderizar(todosAnuncios);
        });

        window.renderizar = (lista) => {
            const grid = document.getElementById('radarGrid');
            grid.innerHTML = "";
            lista.forEach(ad => {
                const isVendido = ad.statusVenda === "vendido";
                let distHtml = "";
                const adLat = ad.coords?.lat || ad.lat;
                const adLon = ad.coords?.lon || ad.lng;
                const locMetodo = ad.coords?.metodo === "gps" ? "Confirmada" : "Aproximada";
                
                if (uLat && adLat) {
                    const d = calcularDistancia(uLat, uLng, adLat, adLon);
                    distHtml = ` • ${d}km ${d <= 5 ? '<span style="color:var(--green)">PERTO</span>' : ''}`;
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <a href="anuncio.html?id=${ad.id}" style="text-decoration:none; color:inherit; height:100%; display:flex; flex-direction:column;">
                        <div class="img-container">
                            ${isVendido ? '<div class="badge-vendido">VENDIDO</div>' : ''}
                            <img src="${ad.fotos?.[0] || ''}" style="filter:${isVendido ? 'grayscale(1)' : 'none'}">
                        </div>
                        <h3 style="font-size:13px; font-weight:800; margin-bottom:5px;">${ad.modelo}</h3>
                        <div style="font-size:10px; color:var(--text-muted); font-weight:600;">
                            ${ad.capacidade || '--'} • Bateria ${ad.bateria || '--'}% • ${ad.condicao || ad.estado || '--'}
                        </div>
                        <div style="font-size:10px; color:var(--green); font-weight:700; margin-top:5px;">
                            📍 ${ad.cidade} <small style="font-weight:400; color:#94a3b8">(${locMetodo})</small>${distHtml}
                        </div>
                        <div class="price-tag">R$ ${parseFloat(ad.preco || 0).toLocaleString('pt-br', {minimumFractionDigits:2})}</div>
                    </a>`;
                grid.appendChild(card);
            });
        };

        // --- BUSCA E MATCH ---
        window.toggleMenu = () => document.getElementById('mobileMenu').classList.toggle('active');
        window.toggleBusca = () => document.getElementById('buscaManualBox').classList.toggle('open');
        window.fecharMatch = () => document.getElementById('matchPopup').classList.remove('active');
        window.aceitarCookies = () => { localStorage.setItem('lgpd_ok', 'true'); document.getElementById('lgpdBanner').style.display = 'none'; };

        window.buscarManual = () => {
            const marca = document.getElementById('buscaMarca').value.toLowerCase();
            const filtrados = todosAnuncios.filter(ad => (ad.marca || '').toLowerCase().includes(marca) || (ad.modelo || '').toLowerCase().includes(marca));
            renderizar(filtrados);
        };

        window.limparBusca = () => {
            document.getElementById('buscaMarca').value = "";
            renderizar(todosAnuncios);
            document.getElementById('buscaManualBox').classList.remove('open');
        };

        window.fazerMatch = () => {
            const mod = document.getElementById('matchModelo').value.toLowerCase();
            const pMax = parseFloat(document.getElementById('matchPreco').value) || Infinity;
            if(!mod) return alert("Digite o modelo!");
            
            document.getElementById('mCircle').className = "status-circle searching";
            setTimeout(() => {
                const match = todosAnuncios.filter(a => a.statusVenda !== "vendido" && a.modelo.toLowerCase().includes(mod) && parseFloat(a.preco) <= pMax)
                              .sort((a,b) => (b.bateria||0) - (a.bateria||0))[0];
                document.getElementById('mCircle').className = "status-circle";
                if(match) {
                    document.getElementById('matchData').innerHTML = `<img src="${match.fotos?.[0]}" style="width:60px; height:60px; object-fit:contain; border-radius:10px; background:white;">
                        <div><b>${match.modelo}</b><br>R$ ${match.preco}</div>`;
                    document.getElementById('matchLink').href = `anuncio.html?id=${match.id}`;
                    document.getElementById('matchPopup').classList.add('active');
                } else { alert("Nenhum match ideal agora."); }
            }, 1200);
        };

        if(!localStorage.getItem('lgpd_ok')) document.getElementById('lgpdBanner').style.display = 'flex';
    </script>
</body>
</html>
