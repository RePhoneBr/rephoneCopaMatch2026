<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RePhone | Match Inteligente</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LHRJ19C0CW"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-LHRJ19C0CW', { 'storage': 'denied' });
    </script>

    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root { --dark: #0f172a; --green: #16a34a; --green-light: #4ade80; --bg: #f8fafc; --text-muted: #64748b; --blue: #3b82f6; --red: #ef4444; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); overflow-x: hidden; }
        
        .main-header { background: var(--dark); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 25px 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 22px; color: white; text-decoration: none; }
        .logo span { color: var(--green); }
        .slogan { color: #94a3b8; font-size: 10px; font-weight: 600; margin-top: 4px; }
        .btn-menu-icon { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }

        .ticker-wrapper { width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); color: white; overflow: hidden; white-space: nowrap; padding: 12px 0; font-size: 11px; font-weight: 800; cursor: pointer; position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .ticker-content { display: inline-block; animation: ticker-animation 35s linear infinite; }
        .ticker-item { display: inline-block; padding-right: 60px; text-transform: uppercase; letter-spacing: 0.5px; }
        .ticker-highlight { color: #3b82f6; background: rgba(59, 130, 246, 0.2); padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(59, 130, 246, 0.5); margin: 0 10px; font-weight: 900; }
        @keyframes ticker-animation { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .hero { padding: 10px 20px 30px; max-width: 600px; margin: 0 auto; }
        .match-card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .btn-match { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-match:active { transform: scale(0.98); }

        .feed { padding: 0 15px 150px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 1024px) { .feed { grid-template-columns: repeat(4, 1fr); } }

        .card { background: white; border-radius: 20px; padding: 10px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; text-decoration: none; color: inherit; transition: 0.2s; }
        .img-container { width: 100%; aspect-ratio: 1/1; background: #f1f5f9; border-radius: 14px; overflow: hidden; margin-bottom: 8px; position: relative; display: flex; align-items: center; justify-content: center; }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .price-tag { background: linear-gradient(135deg, #16a34a, #4ade80); color: white; padding: 5px 10px; border-radius: 8px; font-weight: 900; font-size: 15px; margin-top: auto; align-self: flex-start; }
        
        #mobileMenu { position: fixed; top: -110%; left: 0; width: 100%; background: var(--dark); padding: 80px 25px 30px; z-index: 2000; transition: 0.4s ease; border-radius: 0 0 30px 30px; display: flex; flex-direction: column; gap: 12px; }
        #mobileMenu.active { top: 0; }
        #menuOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1900; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="brand-container">
            <a href="index.html" class="logo">Re<span>Phone</span></a>
            <span class="slogan">O Match do seu novo celular</span>
        </div>
        <button class="btn-menu-icon" onclick="toggleMenu()">☰</button>
    </header>

    <div class="ticker-wrapper" id="tickerWrapper">
        <div class="ticker-content" id="tickerContent">
            <span class="ticker-highlight" onclick="window.location.href='como-comprar.html'">📖 GUIA: COMO COMPRAR COM SEGURANÇA</span>
            <span class="ticker-item">🛡️ NUNCA PAGUE ANTES DE TESTAR O APARELHO EM MÃOS!</span>
            <span class="ticker-item">📍 PREFIRA ENCONTROS EM LOCAIS PÚBLICOS</span>
        </div>
    </div>

    <div class="hero">
        <div class="match-card">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
                <div id="mCircle" style="width:10px; height:10px; border-radius:50%; background:#cbd5e1;"></div>
                <div style="font-size: 11px; font-weight: 800; color: var(--text-muted);">BUSCADOR INTELIGENTE</div>
            </div>
            <label style="display:block; font-size:11px; font-weight:800; margin-bottom:5px;">MODELO</label>
            <input type="text" id="matchModelo" placeholder="Ex: iPhone 13 Pro" style="width:100%; padding:14px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:15px;">
            <button class="btn-match" onclick="fazerMatch()">DAR MATCH</button>
        </div>
    </div>

    <main id="radarGrid" class="feed"></main>

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <nav id="mobileMenu">
        <div id="greeting" style="color:white; font-size:12px; text-align:center; font-weight:800; margin-bottom:10px;">MENU REPHONE</div>
        <a href="index.html" class="menu-link" style="color:white; text-decoration:none; padding:15px; background:rgba(255,255,255,0.1); border-radius:10px; text-align:center; font-weight:800;">🏠 INÍCIO</a>
        <div id="menuGuest" style="display:flex; flex-direction:column; gap:10px;">
            <a href="login-cliente.html" style="color:white; text-decoration:none; padding:15px; background:var(--blue); border-radius:10px; text-align:center; font-weight:800;">🛍️ LOGIN COMPRADOR</a>
            <a href="vendedor-login.html" style="color:white; text-decoration:none; padding:15px; background:var(--green); border-radius:10px; text-align:center; font-weight:800;">💼 PAINEL VENDEDOR</a>
        </div>
        <div id="divLogout" style="display:none; margin-top:10px;">
            <button onclick="fazerLogout()" style="width:100%; padding:15px; border-radius:10px; border:1px solid var(--red); background:none; color:var(--red); font-weight:800; cursor:pointer;">SAIR DA CONTA</button>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, getDoc, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
            authDomain: "rephone-a0a80.firebaseapp.com", 
            projectId: "rephone-a0a80", 
            storageBucket: "rephone-a0a80.firebasestorage.app", 
            appId: "1:431497247030:web:a943715e4acc04b8995b97" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let todosAnuncios = [];

        // Auth Listener Profissional
        onAuthStateChanged(auth, async (user) => {
            const logoutUI = document.getElementById('divLogout');
            const guestUI = document.getElementById('menuGuest');
            if (user) {
                guestUI.style.display = 'none';
                logoutUI.style.display = 'block';
                const sellerDoc = await getDoc(doc(db, "vendedores", user.uid));
                document.getElementById('greeting').innerText = sellerDoc.exists() ? "OLÁ, LOJISTA" : "OLÁ, COMPRADOR";
            } else {
                guestUI.style.display = 'flex';
                logoutUI.style.display = 'none';
                document.getElementById('greeting').innerText = "MENU REPHONE";
            }
        });

        // Banner Dinâmico Otimizado
        async function atualizarBannerDinamico() {
            const tickerContent = document.getElementById('tickerContent');
            const guia = `<span class="ticker-highlight" onclick="window.location.href='como-comprar.html'">📖 GUIA DE SEGURANÇA REPHONE</span>`;
            try {
                const q = query(collection(db, "anuncios"), where("status", "==", "aprovado"), orderBy("preco", "asc"), limit(1));
                const snap = await getDocs(q);
                if (!snap.empty) {
                    const ad = snap.docs[0].data();
                    const preco = parseFloat(ad.preco || 0).toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
                    const oferta = `<span class="ticker-item">🔥 MELHOR PREÇO: ${ad.modelo} POR ${preco} EM ${ad.cidade}!</span>`;
                    tickerContent.innerHTML = oferta + guia + oferta + guia;
                }
            } catch (e) { console.error("Erro banner:", e); }
        }

        // Snapshot de Anúncios (Radar)
        onSnapshot(query(collection(db, "anuncios"), where("status", "==", "aprovado")), (snap) => {
            todosAnuncios = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderizar(todosAnuncios);
            atualizarBannerDinamico();
        });

        window.renderizar = (lista) => {
            const grid = document.getElementById('radarGrid');
            grid.innerHTML = lista.length ? "" : "<p style='grid-column:1/-1; text-align:center; padding:20px;'>Nenhum aparelho encontrado.</p>";
            lista.forEach(ad => {
                const card = document.createElement('div');
                card.className = 'card';
                const img = (ad.fotos && ad.fotos.length) ? ad.fotos[0] : 'https://via.placeholder.com/300?text=Sem+Foto';
                const preco = parseFloat(ad.preco || 0).toLocaleString('pt-br', {minimumFractionDigits: 2});
                
                card.innerHTML = `
                    <a href="anuncio.html?id=${ad.id}" style="text-decoration:none; color:inherit; height:100%; display:flex; flex-direction:column;">
                        <div class="img-container">
                            ${ad.statusVenda === "vendido" ? '<div class="badge-vendido">VENDIDO</div>' : ''}
                            <img src="${img}" alt="${ad.modelo}">
                        </div>
                        <h3 style="font-size:13px; font-weight:800; padding:0 5px;">${ad.modelo || 'Modelo não informado'}</h3>
                        <div style="font-size:10px; color:var(--text-muted); margin:5px 0; padding:0 5px;">📍 ${ad.cidade || 'Localização...'}</div>
                        <div class="price-tag">R$ ${preco}</div>
                    </a>`;
                grid.appendChild(card);
            });
        };

        window.toggleMenu = () => {
            const menu = document.getElementById('mobileMenu');
            const overlay = document.getElementById('menuOverlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        };

        window.fazerMatch = () => {
            const mod = document.getElementById('matchModelo').value.toLowerCase().trim();
            if(!mod) return alert("Digite um modelo para o Match!");
            const match = todosAnuncios.find(a => a.modelo.toLowerCase().includes(mod) && a.statusVenda !== 'vendido');
            if(match) window.location.href = `anuncio.html?id=${match.id}`;
            else alert("Nenhum match exato encontrado agora. Tente outro modelo!");
        };

        window.fazerLogout = () => signOut(auth).then(() => window.location.reload());
    </script>
</body>
</html>
