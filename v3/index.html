<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RePhone | Match Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --green: #16a34a; --green-light: #4ade80; --bg: #f8fafc; --text-muted: #64748b; --blue: #3b82f6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); overflow-x: hidden; }
        
        /* HEADER */
        .main-header { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-radius: 0 0 25px 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo { font-weight: 900; font-size: 22px; color: white; text-decoration: none; }
        .logo span { color: var(--green); }
        .btn-menu-icon { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }

        .location-bar { text-align: center; font-size: 11px; color: var(--text-muted); padding: 15px 20px 5px; font-weight: 600; }

        /* GRID E CARDS - PADRONIZAÇÃO */
        .feed { 
            padding: 0 15px 100px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* Mobile: 2 colunas */
            gap: 12px; 
            max-width: 1100px; 
            margin: 0 auto; 
        }

        @media (min-width: 768px) { .feed { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .feed { grid-template-columns: repeat(4, 1fr); } }

        .card { background: white; border-radius: 20px; padding: 10px; border: 1px solid #e2e8f0; transition: 0.3s; position: relative; display: flex; flex-direction: column; height: 100%; }
        
        /* PADRONIZAÇÃO DA IMAGEM */
        .img-container { 
            width: 100%; 
            height: 150px; /* Altura fixa para mobile */
            background: #f1f5f9; 
            border-radius: 14px; 
            overflow: hidden; 
            margin-bottom: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        @media (min-width: 1024px) { .img-container { height: 180px; } }

        .card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Faz a imagem preencher o espaço sem distorcer */
        }

        /* TAGS */
        .tag-vendedor { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 4px; }
        .tag-particular { background: #f1f5f9; color: var(--muted); }
        .tag-lojista { background: #eff6ff; color: var(--blue); }
        .tag-verificado { color: var(--green); margin-left: 4px; font-size: 10px; }

        .price-tag { background: linear-gradient(135deg, #16a34a, #4ade80); color: white; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 14px; margin-top: auto; align-self: flex-start; }
        
        /* POPUP MATCH */
        #matchPopup { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--dark); color: white; padding: 25px; border-radius: 30px 30px 0 0; z-index: 3000; transition: 0.6s; }
        #matchPopup.active { bottom: 0; }

        /* OUTROS */
        .match-card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .match-card input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        .btn-match { width: 100%; background: var(--green); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="logo">Re<span>Phone</span></a>
        <button class="btn-menu-icon" onclick="toggleMenu()">☰</button>
    </header>

    <div class="location-bar" id="txtLocation">📍 Localizando ofertas...</div>

    <section class="hero" style="padding: 20px; max-width: 600px; margin: 0 auto;">
        <div class="match-card">
            <label style="font-size: 11px; font-weight: 800; color: var(--text-muted);">BUSCA INTELIGENTE</label>
            <input type="text" id="matchModelo" placeholder="Qual iPhone você busca?">
            <input type="number" id="matchPreco" placeholder="Preço máximo?">
            <button class="btn-match" onclick="fazerMatch()">DAR MATCH</button>
        </div>
    </section>

    <main id="radarGrid" class="feed"></main>

    <div id="matchPopup">
        <span class="match-label" style="display:block; text-align:center; font-weight:900; margin-bottom:15px; color:var(--green-light)">🔥 MATCH ENCONTRADO!</span>
        <div id="matchData" style="display: flex; align-items: center; gap: 15px;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
            <button class="btn-match" style="background:#334155" onclick="fecharMatch()">FECHAR</button>
            <a href="#" id="matchLink" class="btn-match" style="text-decoration:none; text-align:center;">VER AGORA</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
            authDomain: "rephone-a0a80.firebaseapp.com", 
            projectId: "rephone-a0a80", 
            storageBucket: "rephone-a0a80.firebasestorage.app", 
            appId: "1:431497247030:web:a943715e4acc04b8995b97" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let todosAnuncios = [];
        let userLat = null, userLng = null;

        window.fecharMatch = () => document.getElementById('matchPopup').classList.remove('active');

        // Localização do Usuário
        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude; userLng = pos.coords.longitude;
            document.getElementById('txtLocation').innerHTML = "📍 Localização <strong>Confirmada</strong>";
            renderizar(todosAnuncios);
        }, () => {
            document.getElementById('txtLocation').innerHTML = "📍 Localização <strong>Aproximada (IP)</strong>";
        });

        onSnapshot(collection(db, "anuncios"), (snap) => {
            todosAnuncios = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const aprovados = todosAnuncios.filter(ad => ad.status === "aprovado" || ad.statusAnuncio === "aprovado");
            renderizar(aprovados);
        });

        function renderizar(lista) {
            const grid = document.getElementById('radarGrid');
            grid.innerHTML = "";
            lista.forEach(ad => {
                const isLojista = ad.vendedorTipo === "lojista";
                const isVerificado = ad.statusVendedor === "verificado" || ad.status === "verificado";
                
                // Lógica de Confirmação de Localização do Anúncio
                const locMetodo = ad.coords?.metodo === "gps" ? "Confirmada" : "Aproximada";

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <a href="anuncio.html?id=${ad.id}" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; height:100%;">
                        <div class="img-container">
                            <img src="${ad.fotos?.[0] || 'https://via.placeholder.com/200'}" loading="lazy">
                        </div>
                        
                        <div>
                            <span class="tag-vendedor ${isLojista ? 'tag-lojista' : 'tag-particular'}">${isLojista ? 'Lojista' : 'Particular'}</span>
                            ${isVerificado ? '<span class="tag-verificado">● Verificado</span>' : ''}
                        </div>

                        <h3 style="font-size:13px; font-weight:800; margin:4px 0;">${ad.modelo}</h3>
                        <p style="font-size:10px; color:var(--text-muted);">${ad.capacidade} • Bateria ${ad.bateria}%</p>
                        
                        <p style="font-size:10px; color:var(--green); font-weight:700; margin-top:5px;">
                            📍 ${ad.cidade} <span style="font-weight:400; color:var(--text-muted); font-size:9px;">(${locMetodo})</span>
                        </p>
                        
                        <div class="price-tag">R$ ${parseFloat(ad.preco || 0).toLocaleString('pt-br', {minimumFractionDigits:2})}</div>
                    </a>`;
                grid.appendChild(card);
            });
        }

        window.fazerMatch = () => {
            const mod = document.getElementById('matchModelo').value.toLowerCase();
            const pMax = parseFloat(document.getElementById('matchPreco').value) || Infinity;
            
            const match = todosAnuncios.find(a => a.modelo.toLowerCase().includes(mod) && parseFloat(a.preco) <= pMax);
            
            if(match) {
                document.getElementById('matchData').innerHTML = `
                    <img src="${match.fotos[0]}" style="width:70px; height:70px; border-radius:12px; object-fit:cover;">
                    <div>
                        <b style="font-size:16px;">${match.modelo}</b><br>
                        <span style="color:var(--green-light); font-weight:800;">R$ ${match.preco}</span>
                    </div>`;
                document.getElementById('matchLink').href = `anuncio.html?id=${match.id}`;
                document.getElementById('matchPopup').classList.add('active');
            } else {
                alert("Nenhum match no momento!");
            }
        };
    </script>
</body>
</html>
