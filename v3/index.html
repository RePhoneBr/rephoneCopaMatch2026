<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RePhone | Match Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root { --dark: #0f172a; --green: #16a34a; --green-light: #4ade80; --bg: #f8fafc; --text-muted: #64748b; --blue: #3b82f6; --red: #ef4444; --gold: #bda677; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); overflow-x: hidden; padding-bottom: 80px; }
        
        /* HEADER E BANNER */
        .main-header { background: var(--dark); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 25px 25px; }
        .logo { font-weight: 900; font-size: 22px; color: white; text-decoration: none; }
        .logo span { color: var(--green); }
        .ticker-wrapper { width: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); color: white; overflow: hidden; white-space: nowrap; padding: 12px 0; font-size: 11px; font-weight: 800; position: sticky; top: 0; z-index: 999; }
        .ticker-content { display: inline-block; animation: ticker-animation 35s linear infinite; }
        @keyframes ticker-animation { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* CARDS E SELOS */
        .feed { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 10px; border: 1px solid #e2e8f0; text-decoration: none; color: inherit; display: flex; flex-direction: column; position: relative; }
        .badge-verificado { position: absolute; top: 5px; right: 5px; background: var(--blue); color: white; font-size: 8px; padding: 3px 6px; border-radius: 5px; font-weight: 900; z-index: 5; }
        .badge-tipo { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-top: 5px; align-self: flex-start; }
        .tipo-lojista { background: rgba(59, 130, 246, 0.1); color: var(--blue); }
        .tipo-particular { background: #f1f5f9; color: var(--text-muted); }
        
        /* MENU E OVERLAY */
        #mobileMenu { position: fixed; top: -110%; left: 0; width: 100%; background: var(--dark); padding: 80px 25px 30px; z-index: 2000; transition: 0.4s; border-radius: 0 0 30px 30px; }
        #mobileMenu.active { top: 0; }
        #menuOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1900; }
        
        /* RODAPÉ FIXO */
        .rephone-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); padding: 15px; z-index: 1000; border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; align-items: center; }
        
        /* POPUP MATCH */
        #matchPopup { position: fixed; bottom: -110%; left: 0; width: 100%; background: var(--dark); color: white; padding: 25px; border-radius: 30px 30px 0 0; z-index: 3000; transition: 0.5s; text-align: center; }
        #matchPopup.active { bottom: 0; }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="logo">Re<span>Phone</span></a>
        <button style="background:none; border:none; color:white; font-size:28px;" onclick="toggleMenu()">☰</button>
    </header>

    <div class="ticker-wrapper">
        <div class="ticker-content" id="tickerContent">
            <span style="margin-right:50px;">🛡️ NUNCA PAGUE ANTES DE TESTAR O APARELHO EM MÃOS!</span>
            <span style="margin-right:50px;">📍 PREFIRA ENCONTROS EM LOCAIS PÚBLICOS</span>
        </div>
    </div>

    <div style="text-align:center; font-size:11px; padding:10px;" id="txtLocation">📍 Localizando...</div>

    <section style="padding:10px 20px; max-width:600px; margin:0 auto;">
        <div style="background:white; padding:20px; border-radius:30px; border:1px solid #f1f5f9;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:15px;">
                <div id="mCircle" style="width:10px; height:10px; border-radius:50%; background:#cbd5e1;"></div>
                <span style="font-size:10px; font-weight:800; color:var(--text-muted);">BUSCADOR INTELIGENTE</span>
            </div>
            <input type="text" id="matchModelo" placeholder="Modelo (ex: iPhone 13)" style="width:100%; padding:14px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:10px;">
            <input type="number" id="matchPreco" placeholder="Preço Máximo" style="width:100%; padding:14px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:15px;">
            <button onclick="fazerMatch()" style="width:100%; background:var(--green); color:white; padding:16px; border:none; border-radius:15px; font-weight:800;">DAR MATCH</button>
        </div>
    </section>

    <main id="radarGrid" class="feed"></main>

    <footer class="rephone-footer">
        <div style="display:flex; gap:15px; font-size:11px; margin-bottom:5px;">
            <a href="#" style="color:#94a3b8; text-decoration:none;">Privacidade</a>
            <a href="#" style="color:#94a3b8; text-decoration:none;">Termos</a>
        </div>
        <div style="color:white; font-size:10px; font-weight:800;">RePhone © 2026</div>
    </footer>

    <div id="matchPopup">
        <div id="matchStatusLabel" style="font-size:12px; font-weight:900; color:var(--green); margin-bottom:10px;">🔥 MATCH ENCONTRADO!</div>
        <div id="matchData" style="display:flex; align-items:center; gap:15px; justify-content:center; margin-bottom:20px;"></div>
        <a id="matchLink" href="#" style="background:var(--green); color:white; text-decoration:none; display:block; padding:15px; border-radius:12px; font-weight:800;">VER APARELHO</a>
        <button onclick="document.getElementById('matchPopup').classList.remove('active')" style="background:none; border:none; color:white; margin-top:15px; font-weight:700;">Fechar</button>
    </div>

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <nav id="mobileMenu">
        <div id="greeting" style="color:white; font-size:12px; text-align:center; font-weight:800; margin-bottom:20px;">MENU REPHONE</div>
        <a href="index.html" style="color:white; text-decoration:none; padding:15px; background:rgba(255,255,255,0.05); border-radius:12px; display:block; text-align:center; font-weight:800;">🏠 INÍCIO</a>
        <div id="menuGuest">
            <a href="login-cliente.html" style="color:white; text-decoration:none; padding:15px; background:var(--blue); border-radius:12px; display:block; text-align:center; font-weight:800; margin-top:10px;">🛍️ LOGIN</a>
        </div>
        <div id="divLogout" style="display:none; margin-top:20px;">
            <button onclick="fazerLogout()" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--red); background:none; color:var(--red); font-weight:800;">SAIR</button>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, getDoc, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", authDomain: "rephone-a0a80.firebaseapp.com", projectId: "rephone-a0a80", storageBucket: "rephone-a0a80.firebasestorage.app", appId: "1:431497247030:web:a943715e4acc04b8995b97" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let todosAnuncios = [];
        let uLat = null, uLng = null;

        // --- LOCALIZAÇÃO ---
        navigator.geolocation.getCurrentPosition(async (pos) => {
            uLat = pos.coords.latitude; uLng = pos.coords.longitude;
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${uLat}&lon=${uLng}`);
            const data = await res.json();
            document.getElementById('txtLocation').innerHTML = `📍 Ofertas em <strong>${data.address.city || data.address.town}</strong>`;
        });

        // --- AUTH ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('menuGuest').style.display = user ? 'none' : 'block';
            document.getElementById('divLogout').style.display = user ? 'block' : 'none';
        });

        // --- CARREGAR DADOS ---
        onSnapshot(query(collection(db, "anuncios"), where("status", "==", "aprovado")), (snap) => {
            todosAnuncios = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderizar(todosAnuncios);
        });

        window.renderizar = (lista) => {
            const grid = document.getElementById('radarGrid');
            grid.innerHTML = "";
            lista.forEach(ad => {
                const card = document.createElement('div');
                card.className = 'card';
                const isLojista = ad.tipoVendedor === 'lojista';
                card.innerHTML = `
                    ${isLojista ? '<div class="badge-verificado">VERIFICADO</div>' : ''}
                    <div class="img-container" style="width:100%; aspect-ratio:1/1; background:#f8fafc; border-radius:15px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                        <img src="${ad.fotos?.[0] || ''}" style="max-width:90%; max-height:90%; object-fit:contain;">
                    </div>
                    <div class="badge-tipo ${isLojista ? 'tipo-lojista' : 'tipo-particular'}">${ad.tipoVendedor || 'Particular'}</div>
                    <h3 style="font-size:13px; font-weight:800; margin:5px 0;">${ad.modelo}</h3>
                    <div style="font-size:10px; color:var(--text-muted); font-weight:600;">${ad.capacidade || '--'} • Bateria ${ad.bateria || '--'}% • ${ad.condicao || '--'}</div>
                    <div class="price-tag">R$ ${parseFloat(ad.preco).toLocaleString('pt-br')}</div>
                    <a href="anuncio.html?id=${ad.id}" style="position:absolute; inset:0;"></a>
                `;
                grid.appendChild(card);
            });
        };

        // --- ALGORITMO DE MATCH INTELIGENTE ---
        window.fazerMatch = () => {
            const mod = document.getElementById('matchModelo').value.toLowerCase().trim();
            const pMax = parseFloat(document.getElementById('matchPreco').value) || Infinity;
            
            if(!mod && pMax === Infinity) return alert("Digite um modelo ou valor!");

            document.getElementById('mCircle').classList.add('searching');

            setTimeout(() => {
                // 1. Filtrar anúncios válidos
                let candidatos = todosAnuncios.filter(a => a.statusVenda !== 'vendido' && parseFloat(a.preco) <= pMax);
                
                if(mod) candidatos = candidatos.filter(a => a.modelo.toLowerCase().includes(mod));

                // 2. Ranking de Pontuação
                candidatos.sort((a, b) => {
                    let scoreA = 0, scoreB = 0;
                    
                    // Prioridade Lojista
                    if(a.tipoVendedor === 'lojista') scoreA += 50;
                    if(b.tipoVendedor === 'lojista') scoreB += 50;
                    
                    // Condição (Novo > Lacrado > Vitrine > Usado)
                    const pesos = { 'Novo': 40, 'Lacrado': 35, 'Vitrine': 30, 'Excelente': 20, 'Bom': 10 };
                    scoreA += (pesos[a.condicao] || 0);
                    scoreB += (pesos[b.condicao] || 0);
                    
                    // Capacidade e Bateria
                    scoreA += (parseInt(a.capacidade) || 0) / 10;
                    scoreA += (parseInt(a.bateria) || 0);
                    scoreB += (parseInt(b.capacidade) || 0) / 10;
                    scoreB += (parseInt(b.bateria) || 0);

                    return scoreB - scoreA;
                });

                const res = candidatos[0];
                const popup = document.getElementById('matchPopup');
                document.getElementById('mCircle').classList.remove('searching');

                if(res) {
                    const isSugestao = mod && !res.modelo.toLowerCase().includes(mod);
                    document.getElementById('matchStatusLabel').innerText = isSugestao ? "⚠️ MATCH NÃO ENCONTRADO, VEJA ESTA SUGESTÃO:" : "🔥 MATCH ENCONTRADO!";
                    document.getElementById('matchStatusLabel').style.color = isSugestao ? "var(--gold)" : "var(--green)";
                    
                    document.getElementById('matchData').innerHTML = `
                        <img src="${res.fotos?.[0]}" style="width:60px; height:60px; border-radius:10px; object-fit:cover;">
                        <div style="text-align:left;">
                            <div style="font-size:14px; font-weight:800;">${res.modelo}</div>
                            <div style="font-size:12px; font-weight:700; color:var(--green);">R$ ${res.preco}</div>
                        </div>
                    `;
                    document.getElementById('matchLink').href = `anuncio.html?id=${res.id}`;
                    popup.classList.add('active');
                } else {
                    alert("Nenhum aparelho encontrado no momento.");
                }
            }, 1000);
        };

        window.toggleMenu = () => {
            const menu = document.getElementById('mobileMenu');
            const overlay = document.getElementById('menuOverlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        };

        window.fazerLogout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
