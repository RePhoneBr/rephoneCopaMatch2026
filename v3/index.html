<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RePhone | Match Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --green: #16a34a; --green-light: #4ade80; --bg: #f8fafc; --text-muted: #64748b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); overflow-x: hidden; }
        
        .main-header { 
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-radius: 0 0 25px 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .logo { font-weight: 900; font-size: 22px; color: white; text-decoration: none; }
        .logo span { color: var(--green); }
        .slogan { color: #94a3b8; font-size: 10px; font-weight: 600; display: block; }
        .btn-menu-icon { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }

        .location-bar { text-align: center; font-size: 11px; color: var(--text-muted); padding: 15px 20px 5px; font-weight: 600; }
        .location-bar strong { color: var(--green); font-weight: 800; }

        #mobileMenu {
            position: fixed; top: -100%; left: 0; width: 100%; background: var(--dark); 
            padding: 80px 25px 30px; z-index: 2000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 0 0 30px 30px; display: flex; flex-direction: column; gap: 12px;
        }
        #mobileMenu.active { top: 0; }
        .menu-link { padding: 18px; border-radius: 15px; text-decoration: none; font-weight: 800; font-size: 13px; text-align: center; color: white; background: rgba(255,255,255,0.05); }
        .menu-link.destaque { background: var(--green); }

        .hero { padding: 10px 20px 30px; max-width: 600px; margin: 0 auto; }
        .match-card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .status-circle { width: 12px; height: 12px; border-radius: 50%; background: #cbd5e1; }
        .searching { background: var(--green); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .match-card label { display: block; font-weight: 800; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .match-card input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; margin-bottom: 12px; font-size: 15px; outline: none; }
        .btn-match { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(22,163,74,0.2); }

        .feed { padding: 0 15px 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 25px; padding: 12px; border: 1px solid #e2e8f0; transition: 0.3s; position: relative; }
        .img-container { width: 100%; aspect-ratio: 1/1; background: #f1f5f9; border-radius: 18px; overflow: hidden; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .card img { max-width: 100%; object-fit: contain; }
        .price-tag { background: linear-gradient(135deg, #16a34a, #4ade80); color: white; padding: 6px 12px; border-radius: 10px; font-weight: 900; display: inline-block; margin-top: 10px; font-size: 14px; }
        .badge-near { background: #10b981; color: white; padding: 2px 8px; border-radius: 10px; font-size: 9px; margin-left: 5px; font-weight: 700; }

        #matchPopup { 
            position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--dark); color: white; 
            padding: 25px; border-radius: 30px 30px 0 0; z-index: 3000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #matchPopup.active { bottom: 0; }
        .match-label { font-size: 22px; font-weight: 900; text-align: center; display: block; color: var(--green-light); margin-bottom: 15px; }

        .busca-collapsible { overflow: hidden; max-height: 0; transition: 0.4s; }
        .busca-collapsible.open { max-height: 500px; margin-top: 15px; }
        #menuOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }
    </style>
</head>
<body class="ios">

    <header class="main-header">
        <div class="brand-container">
            <a href="index.html" class="logo">Re<span>Phone</span></a>
            <span class="slogan">Faça Match no seu novo celular</span>
        </div>
        <button class="btn-menu-icon" onclick="toggleMenu()">☰</button>
    </header>

    <div class="location-bar" id="txtLocation">📍 Localizando ofertas próximas...</div>

    <div id="menuOverlay" onclick="toggleMenu()"></div>
    <nav id="mobileMenu">
        <a href="vendedor-login.html" class="menu-link destaque">Entrar / Vender</a>
        <a href="registro-vendedor.html" class="menu-link">Criar Conta Vendedor</a>
    </nav>

    <section class="hero">
        <div class="match-card">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
                <div id="mCircle" class="status-circle"></div>
                <div id="mText" style="font-size: 11px; font-weight: 800; color: var(--text-muted);">BUSCADOR INTELIGENTE</div>
            </div>
            
            <label>O que você procura?</label>
            <input type="text" id="matchModelo" placeholder="Ex: iPhone 13 Pro">
            
            <label>Até quanto quer pagar?</label>
            <input type="number" id="matchPreco" placeholder="Ex: 3500">
            
            <button class="btn-match" onclick="fazerMatch()">DAR MATCH</button>
            
            <button onclick="toggleBusca()" style="width:100%; background:none; border:none; color:var(--text-muted); font-weight:800; font-size:11px; margin-top:15px; cursor:pointer;">🔍 BUSCA MANUAL</button>
            
            <div id="buscaManualBox" class="busca-collapsible">
                <label>Marca</label>
                <input type="text" id="buscaMarca" placeholder="Apple, Samsung...">
                <button class="btn-match" style="background:var(--dark)" onclick="buscarManual()">FILTRAR</button>
            </div>
        </div>
    </section>

    <h2 style="padding: 0 20px 15px; font-weight: 900; font-size: 20px;">Radar de Ofertas</h2>
    <main id="radarGrid" class="feed"></main>

    <div id="matchPopup">
        <span class="match-label">🔥 MATCH ENCONTRADO!</span>
        <div id="matchData" style="display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
            <button class="btn-match" style="background:#334155" onclick="fecharMatch()">FECHAR</button>
            <a href="#" id="matchLink" class="btn-match" style="text-decoration:none; text-align:center;">VER AGORA</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
            authDomain: "rephone-a0a80.firebaseapp.com", 
            projectId: "rephone-a0a80", 
            storageBucket: "rephone-a0a80.firebasestorage.app", 
            appId: "1:431497247030:web:a943715e4acc04b8995b97" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let todosAnuncios = [];
        let userLat = null, userLng = null;

        window.toggleMenu = () => {
            const menu = document.getElementById('mobileMenu');
            const overlay = document.getElementById('menuOverlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        };

        window.toggleBusca = () => document.getElementById('buscaManualBox').classList.toggle('open');
        window.fecharMatch = () => document.getElementById('matchPopup').classList.remove('active');

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
        }

        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLng}`)
                .then(r => r.json()).then(data => {
                    const cidade = data.address.city || data.address.town || "Sua Região";
                    document.getElementById('txtLocation').innerHTML = `📍 Você está em <strong>${cidade}</strong>`;
                    renderizar(todosAnuncios);
                });
        }, () => document.getElementById('txtLocation').innerHTML = "📍 Localização desativada");

        onSnapshot(query(collection(db, "anuncios"), where("statusAnuncio", "==", "aprovado")), (snap) => {
            todosAnuncios = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderizar(todosAnuncios);
        });

        function renderizar(lista) {
            const grid = document.getElementById('radarGrid');
            grid.innerHTML = "";
            lista.forEach(ad => {
                // CORREÇÃO DO PREÇO: Pega o valor puro do banco
                const precoNum = parseFloat(ad.preco) || 0;
                let distHtml = "";
                if (userLat && ad.coords?.lat) {
                    const d = calcularDistancia(userLat, userLng, ad.coords.lat, ad.coords.lon);
                    if(d <= 50) distHtml = ` • ${d}km <span class="badge-near">PERTO</span>`;
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <a href="anuncio.html?id=${ad.id}" style="text-decoration:none; color:inherit;">
                        <div class="img-container"><img src="${ad.fotos?.[0] || 'https://via.placeholder.com/150'}"></div>
                        <span style="font-size:9px; font-weight:800; color:var(--text-muted); text-transform:uppercase;">${ad.marca}</span>
                        <h3 style="font-size:13px; font-weight:800; margin:4px 0;">${ad.modelo}</h3>
                        <div style="font-size:10px; color:var(--text-muted);">${ad.capacidade} • Bateria ${ad.bateria}%</div>
                        <div style="font-size:10px; color:var(--green); font-weight:700; margin-top:5px;">📍 ${ad.cidade}${distHtml}</div>
                        <div class="price-tag">R$ ${precoNum.toLocaleString('pt-br', {minimumFractionDigits:2})}</div>
                    </a>`;
                grid.appendChild(card);
            });
        }

        window.fazerMatch = () => {
            const mod = document.getElementById('matchModelo').value.toLowerCase();
            const pMax = parseFloat(document.getElementById('matchPreco').value) || Infinity;
            if(!mod) return alert("O que você busca?");

            document.getElementById('mCircle').className = "status-circle searching";
            setTimeout(() => {
                let match = todosAnuncios
                    .filter(a => a.modelo.toLowerCase().includes(mod) && parseFloat(a.preco) <= pMax)
                    .sort((a, b) => b.bateria - a.bateria)[0];

                if(match) {
                    const precoM = parseFloat(match.preco).toLocaleString('pt-br', {minimumFractionDigits:2});
                    document.getElementById('matchData').innerHTML = `
                        <img src="${match.fotos[0]}" style="width:60px; height:60px; border-radius:10px; object-fit:cover;">
                        <div><b style="font-size:14px;">${match.modelo}</b><br><span style="color:var(--green-light)">R$ ${precoM}</span></div>`;
                    document.getElementById('matchLink').href = `anuncio.html?id=${match.id}`;
                    document.getElementById('matchPopup').classList.add('active');
                    document.getElementById('mCircle').className = "status-circle";
                    document.getElementById('mCircle').style.background = "var(--green)";
                } else {
                    alert("Nenhum match encontrado para este preço!");
                    document.getElementById('mCircle').className = "status-circle";
                }
            }, 1200);
        };
    </script>
</body>
</html>
