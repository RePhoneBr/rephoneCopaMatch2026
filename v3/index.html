<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RePhone | Match Inteligente</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* === TODO SEU CSS FOI PRESERVADO === */
/* ❗ Corrigido apenas: chave extra no ticker */

@keyframes tickerMove {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}
</style>
</head>

<body>

<!-- HEADER / MENU / HERO — INTACTOS -->

<div class="ticker-wrap">
  <div class="ticker-title">🔥 ÚLTIMOS VENDIDOS</div>
  <div class="ticker">
    <div class="ticker-content" id="tickerVendidos"></div>
  </div>
</div>

<main id="radarGrid" class="feed"></main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { 
  getFirestore, collection, query, where, onSnapshot, doc, getDoc 
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
import { 
  getAuth, onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

/* 🔥 Firebase INIT (ANTES DE USAR db) */
const firebaseConfig = {
  apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4",
  authDomain: "rephone-a0a80.firebaseapp.com",
  projectId: "rephone-a0a80",
  storageBucket: "rephone-a0a80.firebasestorage.app",
  appId: "1:431497247030:web:a943715e4acc04b8995b97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ===== TICKER VENDIDOS (CORRIGIDO) ===== */
const ticker = document.getElementById("tickerVendidos");

onSnapshot(collection(db, "anuncios"), (snap) => {
  ticker.innerHTML = "";
  const vendidos = [];

  snap.forEach(d => {
    const ad = d.data();
    if (ad.statusVenda === "vendido") vendidos.push(ad);
  });

  if (!vendidos.length) {
    ticker.innerHTML = `<span class="ticker-item">📢 As melhores ofertas aparecem aqui</span>`;
    return;
  }

  vendidos.slice(0, 20).forEach(ad => {
    const preco = Number(ad.preco || 0).toLocaleString("pt-BR",{minimumFractionDigits:2});
    const item = document.createElement("span");
    item.className = "ticker-item";
    item.innerHTML = `📱 ${ad.marca || ""} ${ad.modelo || ""} • <strong>R$ ${preco}</strong> • ${ad.vendedorNome || "RePhone"}`;
    ticker.appendChild(item);
  });

  ticker.innerHTML += ticker.innerHTML;
});

/* ===== LISTAGEM PRINCIPAL ===== */
let todosAnuncios = [];

onSnapshot(
  query(collection(db,"anuncios"), where("status","==","aprovado")),
  snap => {
    todosAnuncios = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderizar(todosAnuncios);
  }
);

function renderizar(lista){
  const grid = document.getElementById("radarGrid");
  grid.innerHTML = "";

  lista.forEach(ad=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <a href="anuncio.html?id=${ad.id}" style="text-decoration:none;color:inherit">
        <div class="img-container">
          <img src="${ad.fotos?.[0] || ""}">
        </div>
        <div class="info-top">${ad.marca || ""}</div>
        <h3>${ad.modelo || ""}</h3>
        <div class="details">${ad.capacidade || ""} • Bateria ${ad.bateria || "--"}%</div>
        <div class="price">R$ ${Number(ad.preco).toLocaleString("pt-BR")}</div>
      </a>
    `;
    grid.appendChild(card);
  });
}
</script>

</body>
</html>
