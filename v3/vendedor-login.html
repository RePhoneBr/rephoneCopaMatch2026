<!-- vendedor-login.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Vendedor | RePhone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* CSS já definido anteriormente */
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">Re<span>Phone</span></div>
  <h2>Painel do Vendedor</h2>
  <form id="loginForm">
    <label>E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" required>
    
    <label>Senha</label>
    <input type="password" id="pass" placeholder="••••••••" required>
    
    <button type="submit" id="btnEntrar" class="btn-login">ENTRAR NO PAINEL</button>
  </form>

  <div class="links-footer">
    Ainda não vende conosco? <br>
    <a href="registro-vendedor.html">Criar minha conta RePhone</a>
  </div>

  <a href="index.html" class="btn-voltar-index">← Voltar ao Radar Público</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const firebaseConfig = { apiKey:"...", authDomain:"...", projectId:"...", storageBucket:"...", messagingSenderId:"...", appId:"..." };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnEntrar');
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;

  btn.innerText = "VERIFICANDO...";
  btn.disabled = true;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = "dashboard-vendedor.html";
  } catch (error) {
    console.error(error);
    let msg = "Erro ao entrar. Verifique e-mail e senha.";
    if (error.code === 'auth/user-not-found') msg = "E-mail não cadastrado.";
    if (error.code === 'auth/wrong-password') msg = "Senha incorreta.";
    alert(msg);
    btn.innerText = "ENTRAR NO PAINEL";
    btn.disabled = false;
  }
};
</script>
</body>
</html>
