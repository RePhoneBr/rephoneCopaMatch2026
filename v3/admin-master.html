<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Master | RePhone Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --green: #10b981; --red: #ef4444; --bg: #f8fafc; --blue: #3b82f6; --muted: #64748b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); padding: 20px; display: none; }
        
        /* Layout */
        .header-adm { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        
        /* Cards */
        .stat-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-card small { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card h2 { font-size: 28px; font-weight: 900; margin-top: 5px; }

        .admin-section { background: white; border-radius: 24px; padding: 25px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .admin-section h3 { font-weight: 900; margin-bottom: 20px; font-size: 18px; color: var(--dark); border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        
        /* Tabelas */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; color: var(--muted); font-size: 12px; text-transform: uppercase; }
        td { padding: 15px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        /* Lista Vendedores */
        .vendedor-item { cursor: pointer; transition: 0.2s; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border: 1px solid #f1f5f9; background: white; }
        .vendedor-item:hover { background: #f8fafc; border-color: var(--blue); transform: translateY(-2px); }

        /* Badges e Botões */
        .badge { padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 10px; text-transform: uppercase; }
        .bg-pending { background: #fef9c3; color: #854d0e; }
        .bg-live { background: #dcfce7; color: #166534; }
        .bg-verified { background: #dbeafe; color: #1e40af; }
        .bg-sold { background: #f1f5f9; color: var(--muted); }

        .btn-action { padding: 8px 12px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 11px; }
        .btn-approve { background: var(--green); color: white; margin-right: 5px; }
        .btn-del { background: #fee2e2; color: var(--red); }
        
        /* Modal */
        #modalVendedor { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15,23,42,0.9); z-index: 1000; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: white; max-width: 650px; margin: 2% auto; border-radius: 30px; padding: 30px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 25px; top: 25px; font-size: 28px; cursor: pointer; font-weight: 900; color: var(--muted); }

        .info-grid-detalhes { background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; margin: 20px 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .info-grid-detalhes p { font-size: 12px; color: #64748b; line-height: 1.4; }
        .info-grid-detalhes strong { color: var(--dark); display: block; font-size: 13px; margin-bottom: 2px; text-transform: capitalize; }

        .img-preview { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: #eee; }
    </style>
</head>
<body>

    <div id="modalVendedor">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()">&times;</span>
            <small style="color: var(--blue); font-weight: 800; text-transform: uppercase;">Dossiê do Parceiro</small>
            <h2 id="mNome" style="font-weight: 900; font-size: 28px; letter-spacing: -1px; margin-bottom: 5px;">Nome do Vendedor</h2>
            
            <div id="mDetalhesVendedor" class="info-grid-detalhes"></div>
            
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; background: #f1f5f9; padding: 15px; border-radius: 15px;">
                <div>
                    <span style="font-size: 11px; font-weight: 700; color: var(--muted); display: block; margin-bottom: 5px;">STATUS ATUAL</span>
                    <span id="mStatusBadge" class="badge">PENDENTE</span>
                </div>
                <button id="btnVerificarVendedor" class="btn-action btn-approve" style="padding: 12px 25px;">APROVAR PARCEIRO</button>
            </div>

            <h4 style="font-weight: 900; margin-bottom: 15px; font-size: 15px;">PRODUTOS NO INVENTÁRIO</h4>
            <div id="mListaAds" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
    </div>

    <div class="header-adm">
        <div>
            <h1 style="font-weight: 900; font-size: 28px; letter-spacing: -1px;">Console Master</h1>
            <p id="userEmail" style="color: var(--muted); font-size: 13px;">Validando privilégios...</p>
        </div>
        <button onclick="logout()" style="background:#fff; border:1px solid #e2e8f0; padding: 10px 20px; border-radius:12px; color:var(--red); font-weight:800; cursor:pointer;">ENCERRAR SESSÃO</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Aparelhos Totais</small>
            <h2 id="countAds">0</h2>
        </div>
        <div class="stat-card">
            <small>Parceiros Ativos</small>
            <h2 id="countVends">0</h2>
        </div>
        <div class="stat-card">
            <small>Aguardando Moderação</small>
            <h2 id="countPending" style="color:var(--red)">0</h2>
        </div>
    </div>

    <div class="admin-section">
        <h3>Moderação de Inventário</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Aparelho</th>
                        <th>Vendedor</th>
                        <th>Preço</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaAnuncios"></tbody>
            </table>
        </div>
    </div>

    <div class="admin-section">
        <h3>Diretório de Parceiros</h3>
        <div id="listaVendedores"></div>
    </div>

    <script type="module" src="app-admin.js"></script>

<script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
            return false;
        }
    };
</script>
</body>
</html>
