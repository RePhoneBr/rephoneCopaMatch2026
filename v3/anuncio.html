<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Detalhes do Aparelho | RePhone</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --dark:#0f172a; --green:#16a34a; --bg:#f8fafc;
  --muted:#64748b; --blue:#3b82f6;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body { background:var(--bg); padding:15px; padding-bottom:110px; color:var(--dark); }

.container { max-width:1200px; margin:auto; }

.header-nav {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;
}

.btn-back {
  text-decoration:none; font-size:12px; font-weight:900; color:var(--muted);
}

.badge-verificado {
  font-size:11px; font-weight:900; padding:6px 14px;
  border-radius:20px; text-transform:uppercase;
}

.main-grid {
  display:grid; grid-template-columns:1fr; gap:25px;
}

@media(min-width:900px){
  .main-grid { grid-template-columns:1fr 1.3fr; }
}

.panel {
  background:#fff; border-radius:30px; padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.gallery {
  background:#f1f5f9; border-radius:25px;
  display:flex; align-items:center; justify-content:center;
  aspect-ratio:1/1; overflow:hidden;
}
.gallery img { max-width:90%; max-height:90%; object-fit:contain; }

.price {
  font-size:32px; font-weight:900; color:var(--green);
  margin:18px 0 25px; display:block;
}
</style>
</head>

<body>

<div class="container">
  <div class="header-nav">
    <a href="index.html" class="btn-back">← Voltar</a>
    <div id="pVendedorTipo" class="badge-verificado">Carregando...</div>
  </div>

  <div class="main-grid" id="mainPanel" style="display:none">
    <div class="gallery">
      <img id="pImg" src="/img/placeholder.png">
    </div>

    <div class="panel">

      <!-- ✅ AVISO STATUS (AGORA NO LUGAR CERTO) -->
      <div id="avisoStatus" style="
        display:none;
        background:#dcfce7;
        color:#166534;
        padding:12px;
        border-radius:14px;
        font-size:13px;
        font-weight:800;
        margin-bottom:12px;">
      </div>

      <h1 id="pModeloHeader">---</h1>
      <span id="pNomeVendedor" style="font-weight:700"></span>
      <span id="pLocal"></span>
      <span class="price" id="pPreco"></span>

      <p id="pDesc"></p>
    </div>
  </div>
</div>

<div class="footer-controls">
  <a id="pZap" href="#">Falar no WhatsApp</a>
  <button id="pShare">Compartilhar</button>
</div>

<script type="module">
/* ===============================
   IMPORTS (TODOS NO TOPO)
================================ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, addDoc, collection,
  serverTimestamp, query, where, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

/* ===============================
   FIREBASE
================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4",
  authDomain: "rephone-a0a80.firebaseapp.com",
  projectId: "rephone-a0a80"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ===============================
   VARIÁVEIS
================================ */
let ad = null;
let id = new URLSearchParams(location.search).get("id");

/* ===============================
   CARREGAR ANÚNCIO
================================ */
const snap = await getDoc(doc(db,"anuncios",id));
ad = snap.data();

const preco = Number(ad.preco).toLocaleString("pt-BR",{minimumFractionDigits:2});

/* ===============================
   STATUS ENTREGA (CORRETO)
================================ */
const qStatus = query(
  collection(db,"interesses"),
  where("anuncioId","==",id)
);

onSnapshot(qStatus,(snap)=>{
  snap.forEach(d=>{
    const i = d.data();
    if(i.status === "entregue"){
      const aviso = document.getElementById("avisoStatus");
      aviso.innerText = "✅ Este aparelho foi marcado como entregue.";
      aviso.style.display = "block";
    }
  });
});

/* ===============================
   PREENCHER TELA
================================ */
document.getElementById("pModeloHeader").innerText = ad.modelo;
document.getElementById("pPreco").innerText = `R$ ${preco}`;
document.getElementById("pDesc").innerText = ad.descricao || "";
document.getElementById("pLocal").innerText = ad.cidade || "";
document.getElementById("pNomeVendedor").innerText =
  ad.nomeVendedor || "Vendedor RePhone";

document.getElementById("mainPanel").style.display="grid";
</script>

</body>
</html>
