<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Detalhes do Aparelho | RePhone</title>

<meta property="og:type" content="website">
<meta property="og:title" id="metaTitle" content="RePhone - Aparelho Disponível">
<meta property="og:description" id="metaDesc" content="Confira este anúncio no RePhone">
<meta property="og:image" id="metaImg" content="https://www.rephone.com.br/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --dark:#0f172a; --green:#16a34a; --bg:#f8fafc;
  --muted:#64748b; --blue:#3b82f6;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

body { background:var(--bg); padding:15px; padding-bottom:110px; color:var(--dark); }

.container { max-width:1200px; margin:auto; }

.header-nav {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;
}

.btn-back {
  text-decoration:none; font-size:12px; font-weight:900; color:var(--muted);
}

.badge-verificado {
  font-size:11px; font-weight:900; padding:6px 14px;
  border-radius:20px; text-transform:uppercase;
}
.status-lojista { background:#dbeafe; color:var(--blue); }
.status-particular { background:#f1f5f9; color:var(--muted); }

.main-grid {
  display:grid; grid-template-columns:1fr; gap:25px;
}

@media(min-width:900px){
  .main-grid { grid-template-columns:1fr 1.3fr; }
}

.panel {
  background:#fff; border-radius:30px; padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.gallery {
  background:#f1f5f9; border-radius:25px;
  display:flex; align-items:center; justify-content:center;
  aspect-ratio:1/1; overflow:hidden;
}
.gallery img { max-width:90%; max-height:90%; object-fit:contain; }

h1 { font-size:26px; font-weight:900; margin-bottom:5px; }

.seller-name { font-weight:700; font-size:16px; margin-top:5px; display:block; }
.location-tag { font-size:13px; color:var(--muted); margin-top:4px; display:block; }

.price {
  font-size:32px; font-weight:900; color:var(--green);
  margin:18px 0 25px; display:block;
}

.info-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px; margin-bottom:25px;
}
.info-box {
  background:#f8fafc; border-radius:18px;
  padding:15px; border:1px solid #e2e8f0;
}
.info-box small {
  font-size:9px; font-weight:900; color:var(--muted);
  text-transform:uppercase; display:block; margin-bottom:4px;
}
.info-box span { font-size:14px; font-weight:700; }

.desc-box { border-top:1px solid #f1f5f9; padding-top:20px; }
.desc-box h4 {
  font-size:11px; font-weight:900; color:var(--muted);
  text-transform:uppercase; margin-bottom:8px;
}
.desc-box p { font-size:14px; line-height:1.6; color:#475569; }

.footer-controls {
  position:fixed; bottom:0; left:0; width:100%;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(10px);
  border-top:1px solid #e2e8f0;
  padding:15px; display:flex; gap:12px; justify-content:center;
}

.btn-zap {
  background:#25d366; color:#fff;
  padding:18px 24px; border-radius:22px;
  font-weight:900; font-size:16px;
  text-decoration:none; max-width:380px; width:100%; text-align:center;
}

.btn-share {
  border:2px solid #e2e8f0; background:#fff;
  border-radius:22px; padding:18px 22px;
  font-weight:800; cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="header-nav">
    <a href="index.html" class="btn-back">← Voltar</a>
    <div id="pVendedorTipo" class="badge-verificado">Carregando...</div>
  </div>

  <div class="main-grid" id="mainPanel" style="display:none">
    <div class="gallery">
      <img id="pImg" src="/img/placeholder.png" alt="Foto do aparelho">
    </div>

    <div class="panel">
      <h1 id="pModeloHeader">---</h1>
      <span id="pNomeVendedor" class="seller-name"></span>
      <span id="pLocal" class="location-tag"></span>
      <span class="price" id="pPreco"></span>

      <div class="info-grid">
        <div class="info-box"><small>Marca</small><span id="pMarca"></span></div>
        <div class="info-box"><small>Modelo</small><span id="pModeloGrid"></span></div>
        <div class="info-box"><small>Cor</small><span id="pCor"></span></div>
        <div class="info-box"><small>Capacidade</small><span id="pCapacidade"></span></div>
        <div class="info-box"><small>Condição</small><span id="pCondicao"></span></div>
        <div class="info-box"><small>Bateria</small><span id="pBateria"></span>%</div>
        <div class="info-box"><small>Garantia</small><span id="pGarantia"></span></div>
      </div>

      <div class="desc-box">
        <h4>Descrição</h4>
        <p id="pDesc"></p>
      </div>
    </div>
  </div>
</div>

<div class="footer-controls">
  <a id="pZap" class="btn-zap" href="#">Falar no WhatsApp</a>
  <button id="pShare" class="btn-share">Compartilhar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4",
  authDomain: "rephone-a0a80.firebaseapp.com",
  projectId: "rephone-a0a80",
  storageBucket: "rephone-a0a80.appspot.com",
  appId: "1:431497247030:web:a943715e4acc04b8995b97"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");
if (!id) alert("Anúncio não encontrado");

const snap = await getDoc(doc(db,"anuncios",id));
if (!snap.exists()) alert("Anúncio não existe");

const ad = snap.data();
const preco = Number(ad.preco).toLocaleString("pt-BR",{minimumFractionDigits:2});

document.getElementById("pImg").src = ad.fotos?.[0] || "/img/placeholder.png";
document.getElementById("pModeloHeader").innerText = ad.modelo;
document.getElementById("pModeloGrid").innerText = ad.modelo;
document.getElementById("pPreco").innerText = `R$ ${preco}`;
document.getElementById("pMarca").innerText = ad.marca || "--";
document.getElementById("pCor").innerText = ad.cor || "--";
document.getElementById("pCapacidade").innerText = ad.capacidade || "--";
document.getElementById("pCondicao").innerText = ad.condicao || "--";
document.getElementById("pBateria").innerText = ad.bateria || "--";
document.getElementById("pGarantia").innerText = ad.garantia || "Sem garantia";
document.getElementById("pDesc").innerText = ad.descricao || "";

document.getElementById("pLocal").innerText = `📍 ${ad.cidade || "Local não informado"}`;

document.getElementById("pZap").href =
`https://wa.me/55${ad.whatsapp}?text=${encodeURIComponent(
`Olá! Vi seu anúncio do ${ad.modelo} no RePhone por R$ ${preco}.`
)}`;

document.getElementById("pShare").onclick = async ()=>{
  if(navigator.share){
    await navigator.share({title:ad.modelo,url:location.href});
  } else {
    await navigator.clipboard.writeText(location.href);
    alert("Link copiado!");
  }
};

document.getElementById("pVendedorTipo").innerText =
ad.tipo==="lojista" ? "🏢 LOJISTA VERIFICADO" : "👤 VENDEDOR PARTICULAR";

document.getElementById("mainPanel").style.display="grid";
</script>

</body>
</html>
