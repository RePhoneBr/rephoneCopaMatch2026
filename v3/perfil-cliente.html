<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | RePhone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #0f172a; --green: #16a34a; --bg: #f8fafc; --text-muted: #64748b; --blue: #3b82f6; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: var(--dark); padding-bottom: 80px; }

        .header-perfil { background: var(--dark); padding: 20px; text-align: center; color: white; border-radius: 0 0 30px 30px; }
        .back-link { position: absolute; left: 20px; top: 25px; color: white; text-decoration: none; font-size: 12px; font-weight: 800; }

        .container { max-width: 500px; margin: -30px auto 0; padding: 0 20px; }
        .profile-card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }

        .avatar-circle { width: 80px; height: 80px; background: var(--green); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; margin: 0 auto 20px; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; margin-left: 5px; }
        .form-group input { width: 100%; padding: 16px; border-radius: 15px; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 15px; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: var(--green); background: white; box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1); }

        .btn-save { width: 100%; background: var(--green); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-save:active { transform: scale(0.98); }

        .info-msg { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <header class="header-perfil">
        <a href="index.html" class="back-link">← VOLTAR</a>
        <h2 style="font-weight: 900; letter-spacing: -1px;">Configurações</h2>
    </header>

    <main class="container">
        <div class="profile-card">
            <div id="avatar" class="avatar-circle">?</div>
            
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="userName" placeholder="Carregando...">
            </div>

            <div class="form-group">
                <label>E-mail (Não pode ser alterado)</label>
                <input type="email" id="userEmail" disabled style="opacity: 0.6; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label>WhatsApp / Telefone</label>
                <input type="tel" id="userPhone" placeholder="(00) 00000-0000">
            </div>

            <button class="btn-save" id="btnSave">SALVAR ALTERAÇÕES</button>
            
            <p class="info-msg">Essas informações são usadas para que os vendedores possam te identificar durante as negociações via WhatsApp.</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
            authDomain: "rephone-a0a80.firebaseapp.com", 
            projectId: "rephone-a0a80", 
            storageBucket: "rephone-a0a80.firebasestorage.app", 
            appId: "1:431497247030:web:a943715e4acc04b8995b97" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let uidAtual = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login-cliente.html";
                return;
            }

            uidAtual = user.uid;
            document.getElementById('userEmail').value = user.email;
            
            // Tenta buscar na coleção de clientes
            const docRef = doc(db, "clientes", user.uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('userName').value = data.nome || "";
                document.getElementById('userPhone').value = data.whatsapp || "";
                if(data.nome) document.getElementById('avatar').innerText = data.nome.charAt(0).toUpperCase();
            } else {
                // Se não existir na coleção, preenche com dados básicos do Auth
                document.getElementById('userName').value = user.displayName || "";
                document.getElementById('avatar').innerText = (user.displayName || "U").charAt(0).toUpperCase();
            }
        });

        document.getElementById('btnSave').onclick = async () => {
            const btn = document.getElementById('btnSave');
            const nome = document.getElementById('userName').value.trim();
            const tel = document.getElementById('userPhone').value.trim();

            if (!nome) return alert("Por favor, preencha seu nome.");

            btn.disabled = true;
            btn.innerText = "SALVANDO...";

            try {
                // Salva ou atualiza na coleção 'clientes'
                await setDoc(doc(db, "clientes", uidAtual), {
                    nome: nome,
                    whatsapp: tel,
                    email: auth.currentUser.email,
                    ultimaAtualizacao: new Date()
                }, { merge: true });

                alert("Perfil atualizado com sucesso!");
                window.location.href = "index.html";
            } catch (e) {
                console.error(e);
                alert("Erro ao salvar dados.");
            } finally {
                btn.disabled = false;
                btn.innerText = "SALVAR ALTERAÇÕES";
            }
        };
    </script>
</body>
</html>
