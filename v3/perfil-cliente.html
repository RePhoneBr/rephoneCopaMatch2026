<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CopaMatch | Entrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #6b0b1a; --gold: #bda677; --bg: #fdfaf3; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .login-card { background: white; width: 100%; max-width: 400px; padding: 35px; border-radius: 30px; box-shadow: 0 15px 35px rgba(107, 11, 26, 0.1); border: 1px solid #f1f5f9; text-align: center; }
        
        .logo { font-weight: 900; font-size: 28px; color: var(--dark); text-decoration: none; margin-bottom: 10px; display: block; }
        .logo span { color: var(--gold); }
        
        h2 { font-size: 14px; color: #64748b; margin-bottom: 30px; font-weight: 600; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 900; color: var(--dark); margin-bottom: 8px; text-transform: uppercase; }
        
        input { width: 100%; padding: 16px; border-radius: 15px; border: 1.5px solid #e2e8f0; font-size: 14px; font-weight: 600; outline: none; }
        input:focus { border-color: var(--dark); }

        .btn-acessar { width: 100%; background: var(--dark); color: white; padding: 18px; border: none; border-radius: 15px; font-weight: 900; font-size: 15px; cursor: pointer; margin-top: 10px; }
        
        .switch-auth { margin-top: 20px; font-size: 12px; color: #64748b; font-weight: 600; }
        .switch-auth span { color: var(--dark); font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-card">
        <a href="index.html" class="logo">Copa<span>Match</span></a>
        <h2>Acesse para gerenciar suas figurinhas</h2>

        <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-acessar" id="btnAuth">ENTRAR OU CADASTRAR</button>
        
        <p class="switch-auth">Não tem conta? O sistema criará uma <br>automaticamente no seu primeiro acesso.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBiN8FqX8UZeyAh1cG2GHZtQWiQH0xPBV4", 
            authDomain: "rephone-a0a80.firebaseapp.com", 
            projectId: "rephone-a0a80", 
            appId: "1:431497247030:web:a943715e4acc04b8995b97" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnAuth').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnAuth');

            if(!email || !password) return alert("Preencha todos os campos!");
            
            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            try {
                // Tenta fazer login
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "dashboard.html";
            } catch (error) {
                // Se o erro for que o usuário não existe, tenta cadastrar
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    try {
                        await createUserWithEmailAndPassword(auth, email, password);
                        window.location.href = "dashboard.html";
                    } catch (err) {
                        alert("Erro ao criar conta: " + err.message);
                    }
                } else {
                    alert("Erro no acesso: " + error.message);
                }
            } finally {
                btn.innerText = "ENTRAR OU CADASTRAR";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
