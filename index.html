<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção | RePhone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #0f172a;
            --green: #16a34a;
            --text-muted: #64748b;
            --bg: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 500px;
            padding: 40px;
        }

        /* Animação do Ícone */
        .icon-box {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        .icon-box::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--green);
            border-radius: 24px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .logo {
            font-weight: 900;
            font-size: 32px;
            margin-bottom: 15px;
            letter-spacing: -1.5px;
        }

        .logo span { color: var(--green); }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--dark);
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .status-badge {
            display: inline-block;
            background: rgba(22, 163, 74, 0.1);
            color: var(--green);
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 50px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Fundo Decorativo */
        .bg-dots {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.3;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-dots"></div>

    <div class="container">
        <div class="icon-box">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1 2.83 0l.3.3a2 2 0 0 1 0 2.83l-3.77 3.77a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1 2.83 0l.3.3a2 2 0 0 1 0 2.83l-3.77 3.77a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77"></path>
                <path d="m2 22 5-5"></path>
                <path d="M9.5 14.5 16 8"></path>
                <path d="m17 2 5 5"></path>
                <path d="m7 12-5 5"></path>
                <path d="m12 17-5 5"></path>
            </svg>
        </div>

        <div class="logo">Re<span>Phone</span></div>
        
        <div class="status-badge">Atualização em curso</div>
        
        <h1 style="margin-top: 20px;">Estamos preparando novidades</h1>
        
        <p>
            Estamos realizando melhorias técnicas em nossa plataforma para garantir a você a melhor experiência em compra e venda de iPhones. Voltaremos em instantes.
        </p>

        <div class="footer">
            © 2025 RePhone — Qualidade e Segurança.
        </div>
    </div>

</body>
</html>
