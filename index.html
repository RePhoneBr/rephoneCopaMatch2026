<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RePhone | Redirecionando...</title>
    
    <meta http-equiv="refresh" content="5;url=https://www.rephone.com.br/v3/">

    <style>
        :root {
            --dark: #0f172a;
            --gold: #bda677;
            --green: #16a34a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .splash-container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 1.2s ease-out forwards;
        }

        .logo-img {
            width: 100%; /* Ocupa a largura do container */
            max-width: 320px; /* Limite para não estourar em telas grandes */
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 20px rgba(189, 166, 119, 0.15));
        }

        /* Loader Minimalista */
        .loader-wrapper {
            width: 180px;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            margin: 0 auto;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .loader-bar {
            position: absolute;
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--green));
            animation: loadProgress 5s linear forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .status-text {
            color: #64748b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <img src="logo.jpg" alt="RePhone Logo" class="logo-img">
        
        <div class="loader-wrapper">
            <div class="loader-bar"></div>
        </div>
        <div class="status-text">Conectando ao Radar</div>
    </div>

    <script>
        // Redireciona via script após 5 segundos
        setTimeout(() => {
            window.location.href = "https://www.rephone.com.br/v3/";
        }, 5000);
    </script>
</body>
</html>
